<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>회원가입 / 로그인</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f5f7fa;
    text-align:center;
    margin:0;
    padding:30px;
}

.card{
    background:white;
    max-width:520px;
    margin:40px auto;
    padding:35px 25px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

h1{
    color:#1f4fbf;
    font-size:34px;
}

p{
    font-size:18px;
    line-height:1.7;
    color:#333;
}

input{
    width:85%;
    padding:16px;
    margin:10px 0;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:10px;
    box-sizing:border-box;
}

a.btn, button{
    display:block;
    width:85%;
    max-width:360px;
    margin:16px auto;
    padding:16px;
    border-radius:10px;
    border:none;
    font-size:18px;
    font-weight:bold;
    text-decoration:none;
    cursor:pointer;
    box-sizing:border-box;
}

.login-btn{
    background:#1f4fbf;
    color:white;
}

.signup-btn{
    background:#d98218;
    color:white;
}

.home-btn{
    background:white;
    color:#1f4fbf;
    border:2px solid #1f4fbf;
}
</style>
</head>

<body>

<div class="card">
    <h1>🔑 회원가입 / 로그인</h1>

    <p>
        회원가입 후에는 반려견 정보 수정,<br>
        여러 마리 관리, 분실 알림 기능을<br>
        이용할 수 있습니다.
    </p>

    <input id="email" type="email" placeholder="이메일">
    <input id="password" type="password" placeholder="비밀번호">

    <button class="login-btn" onclick="loginMember()">로그인</button>

    <a class="btn signup-btn" href="signup.html">무료 회원가입</a>
    <a class="btn home-btn" href="index.html">홈으로 돌아가기</a>
</div>

<script>
function loginMember(){

    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;

    if(email === "" || password === ""){
        alert("이메일과 비밀번호를 입력해주세요.");
        return;
    }

    fetch("https://script.google.com/macros/s/AKfycbyLGnYtQjGZswPnuMesVh5O8YcWdZozgugZRTSJ9_VYk9uREVGQCPfWqweNj7yPlaU/exec", {
        method: "POST",
        body: JSON.stringify({
            action: "login",
            email: email,
            password: password
        })
    })
    .then(function(response){
        return response.text();
    })
    .then(function(result){
        if(result === "login_success"){
            alert("로그인 성공 🐶");
            window.location.href = "my.html";
        }else{
            alert("이메일 또는 비밀번호가 일치하지 않습니다.");
        }
    })
    .catch(function(error){
        alert("로그인 중 오류가 발생했습니다. 다시 시도해주세요.");
    });
}
</script>

</body>
</html>
