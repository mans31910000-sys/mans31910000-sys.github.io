<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 | PETNET KOREA</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f9ff;
    color:#0d1833;
    text-align:center;
    padding:18px;
}

.login-card{
    background:white;
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:26px 22px 30px;
    border-radius:24px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.logo{
    width:170px;
    max-width:70%;
    margin:4px auto 18px;
    display:block;
}

h1{
    margin:0;
    font-size:32px;
    color:#0066cc;
    font-weight:900;
}

.desc{
    font-size:16px;
    line-height:1.55;
    margin:16px 0 22px;
    color:#333;
}

.input-box{
    width:100%;
    height:54px;
    margin-bottom:14px;
    padding:0 16px;
    font-size:17px;
    border:1px solid #d5dce8;
    border-radius:14px;
    outline:none;
    background:#fff;
}

.input-box:focus{
    border-color:#0066cc;
    box-shadow:0 0 0 3px rgba(0,102,204,0.12);
}

.login-btn{
    width:100%;
    height:58px;
    margin-top:8px;
    font-size:21px;
    font-weight:900;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:16px;
    cursor:pointer;
}

.signup-btn{
    display:block;
    width:100%;
    height:54px;
    line-height:54px;
    margin-top:14px;
    font-size:19px;
    font-weight:900;
    background:#d98218;
    color:white;
    text-decoration:none;
    border-radius:16px;
}

.home-btn{
    display:block;
    width:100%;
    height:52px;
    line-height:52px;
    margin-top:14px;
    font-size:18px;
    font-weight:800;
    background:#f0f0f0;
    color:#111;
    text-decoration:none;
    border-radius:16px;
}

.note{
    margin-top:16px;
    font-size:13px;
    color:#777;
    line-height:1.45;
}

@media(max-width:480px){
    body{
        padding:14px;
    }

    .login-card{
        padding:24px 18px 28px;
        border-radius:22px;
    }

    .logo{
        width:155px;
        margin-bottom:16px;
    }

    h1{
        font-size:30px;
    }

    .desc{
        font-size:15px;
        margin:14px 0 20px;
    }

    .input-box{
        height:52px;
        font-size:16px;
        margin-bottom:12px;
    }

    .login-btn{
        height:56px;
        font-size:20px;
    }

    .signup-btn{
        height:52px;
        line-height:52px;
        font-size:18px;
    }

    .home-btn{
        height:50px;
        line-height:50px;
        font-size:17px;
    }
}
</style>
</head>

<body>

<div class="login-card">

    <img src="petnet-logo-crop.png" class="logo" alt="PETNET KOREA 로고">

    <h1>🔑 로그인</h1>

    <p class="desc">
        로그인 후 반려견 정보 수정,<br>
        여러 마리 관리, 분실 알림 기능을<br>
        이용할 수 있습니다.
    </p>

    <input id="email" class="input-box" type="email" placeholder="이메일">

    <input id="password" class="input-box" type="password" placeholder="비밀번호">

    <button id="loginBtn" class="login-btn" onclick="loginMember()">
        로그인
    </button>

    <a class="signup-btn" href="signup.html">
        무료 회원가입
    </a>

    <a class="home-btn" href="index.html">
        🏠 홈으로 돌아가기
    </a>

    <div class="note">
        회원가입은 무료이며, 기본 QR 생성은 로그인 없이도 이용할 수 있습니다.
    </div>

</div>

<script>
function loginMember(){

    var email = document.getElementById("email").value.trim();
    var password = document.getElementById("password").value;
    var loginBtn = document.getElementById("loginBtn");

    if(email === "" || password === ""){
        alert("이메일과 비밀번호를 입력해주세요.");
        return;
    }

    loginBtn.disabled = true;
    loginBtn.innerText = "로그인 중...";

    fetch("https://script.google.com/macros/s/AKfycbzaIBMjrs7szIxm0O1u0id4hKBQ7CTcF3l1Sytn5e8iMQc60l2HbF_JxkMv7KCJ7mA/exec", {
    method: "POST",
    body: JSON.stringify({
        action: "login",
        email: email,
        password: password
    })
})
    })
    .then(function(response){
        return response.text();
    })
    .then(function(result){
        if(result === "login_success"){
            alert("로그인 성공 🐶");
            window.location.href = "my.html";
        }else{
            alert("로그인 실패: " + result);
            loginBtn.disabled = false;
            loginBtn.innerText = "로그인";
        }
    })
    .catch(function(error){
        alert("로그인 중 오류가 발생했습니다. 다시 시도해주세요.");
        loginBtn.disabled = false;
        loginBtn.innerText = "로그인";
    });
}
</script>

</body>
</html>
