<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>후기 작성하기 | PETNET KOREA</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(0,102,204,0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(76,175,80,0.16), transparent 35%),
        linear-gradient(180deg, #f5f9ff 0%, #eef6f1 100%);
    color:#111;
    padding:18px;
    min-height:100vh;
}

.card{
    background:white;
    width:100%;
    max-width:430px;
    margin:28px auto 0;
    padding:28px 20px 32px;
    border-radius:24px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.logo{
    width:160px;
    max-width:70%;
    margin:4px auto 20px;
    display:block;
}

h1{
    text-align:center;
    font-size:30px;
    margin:0 0 10px;
    color:#0066cc;
    font-weight:900;
}

.sub{
    text-align:center;
    font-size:15px;
    line-height:1.6;
    color:#555;
    margin-bottom:24px;
}

label{
    display:block;
    font-size:17px;
    font-weight:900;
    margin:18px 0 8px;
}

input,
textarea,
select{
    width:100%;
    border:2px solid #dce4ef;
    border-radius:14px;
    padding:15px;
    font-size:17px;
    outline:none;
    font-family:Arial, sans-serif;
}

textarea{
    min-height:130px;
    resize:none;
}

input:focus,
textarea:focus,
select:focus{
    border-color:#0066cc;
}

.photo-preview{
    width:100%;
    height:190px;
    border-radius:18px;
    background:#eef3f8;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#999;
    font-size:17px;
    font-weight:900;
    margin-top:10px;
    overflow:hidden;
    text-align:center;
}

.photo-preview img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.notice{
    background:#f5f9ff;
    border:1px solid #dce8f7;
    border-radius:16px;
    padding:15px;
    margin:20px 0;
    font-size:14px;
    line-height:1.6;
    color:#444;
}

.submit-btn{
    width:100%;
    height:58px;
    border:0;
    border-radius:18px;
    background:#0066cc;
    color:white;
    font-size:20px;
    font-weight:900;
    margin-top:10px;
    cursor:pointer;
}

.back-btn{
    display:block;
    width:100%;
    height:54px;
    line-height:54px;
    margin-top:14px;
    text-align:center;
    background:#f0f0f0;
    color:#111;
    font-size:18px;
    font-weight:900;
    text-decoration:none;
    border-radius:16px;
}

@media(max-width:480px){
    body{
        padding:14px;
    }

    .card{
        padding:26px 18px 30px;
    }

    .logo{
        width:150px;
    }

    h1{
        font-size:28px;
    }

    input,
    textarea,
    select{
        font-size:16px;
    }

    .photo-preview{
        height:165px;
    }
}
</style>
</head>

<body>

<div class="card">

    <img src="petnet-logo-crop.png" class="logo" alt="PETNET KOREA 로고">

    <h1>후기 작성하기</h1>

    <p class="sub">
        펫넷 사용 후기나 보호자 연결 사례를 남겨주세요.<br>
        사진 후기도 함께 등록할 수 있습니다.
    </p>

    <label>후기 종류</label>
    <select id="reviewType">
        <option value="">선택해주세요</option>
        <option value="QR 사용 후기">QR 사용 후기</option>
        <option value="보호자 연결 사례">보호자 연결 사례</option>
        <option value="반려견 재회 후기">반려견 재회 후기</option>
        <option value="서비스 개선 의견">서비스 개선 의견</option>
        <option value="기타">기타</option>
    </select>

    <label>작성자 이름</label>
    <input type="text" id="writerName" placeholder="예: 홍길동 또는 별명">

    <label>제목</label>
    <input type="text" id="title" placeholder="후기 제목을 입력해주세요">

    <label>내용</label>
    <textarea id="content" placeholder="펫넷을 사용한 경험이나 보호자 연결 사례를 적어주세요"></textarea>

    <label>사진 선택</label>
    <input type="file" id="photoFile" accept="image/*" onchange="previewPhoto()">

    <div id="photoPreview" class="photo-preview">
        사진을 선택하면 여기에 표시됩니다
    </div>

    <div class="notice">
        ✅ 실제 사용 후기와 보호자 연결 사례를 남겨주세요.<br>
        ✅ 사진은 자동으로 저장되어 후기 목록에 표시됩니다.<br>
        ✅ 댓글과 답글 기능은 다음 단계에서 추가될 예정입니다.
    </div>

    <button class="submit-btn" onclick="submitReview()">
        후기 등록하기
    </button>

    <a class="back-btn" href="reviews.html">
        이전 화면으로 돌아가기
    </a>

</div>

<script>
var resizedPhotoData = "";
var resizedPhotoName = "";
var resizedPhotoType = "";

function previewPhoto(){
    var fileInput = document.getElementById("photoFile");
    var file = fileInput.files[0];

    if(!file){
        return;
    }

    resizedPhotoName = file.name;
    resizedPhotoType = "image/jpeg";

    var reader = new FileReader();

    reader.onload = function(e){
        var img = new Image();

        img.onload = function(){
            var canvas = document.createElement("canvas");
            var maxWidth = 900;
            var maxHeight = 900;
            var width = img.width;
            var height = img.height;

            if(width > height){
                if(width > maxWidth){
                    height = height * (maxWidth / width);
                    width = maxWidth;
                }
            }else{
                if(height > maxHeight){
                    width = width * (maxHeight / height);
                    height = maxHeight;
                }
            }

            canvas.width = width;
            canvas.height = height;

            var ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            resizedPhotoData = canvas.toDataURL("image/jpeg", 0.75);

            document.getElementById("photoPreview").innerHTML =
                '<img src="' + resizedPhotoData + '" alt="선택한 사진">';
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
}

function submitReview(){
    var reviewType = document.getElementById("reviewType").value.trim();
    var writerName = document.getElementById("writerName").value.trim();
    var title = document.getElementById("title").value.trim();
    var content = document.getElementById("content").value.trim();

    if(reviewType === "" || writerName === "" || title === "" || content === ""){
        alert("후기 종류, 작성자 이름, 제목, 내용은 꼭 입력해주세요.");
        return;
    }

    var submitBtn = document.querySelector(".submit-btn");
    submitBtn.disabled = true;
    submitBtn.innerText = "후기 저장 중...";

    var iframe = document.createElement("iframe");
    iframe.name = "hiddenReviewFrame";
    iframe.style.display = "none";
    document.body.appendChild(iframe);

    var form = document.createElement("form");
    form.method = "POST";
    form.action = "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec";
    form.target = "hiddenReviewFrame";
    form.style.display = "none";

    function addInput(name, value){
        var input = document.createElement("input");
        input.type = "hidden";
        input.name = name;
        input.value = value;
        form.appendChild(input);
    }

    addInput("action", "review");
    addInput("reviewType", reviewType);
    addInput("writerName", writerName);
    addInput("title", title);
    addInput("content", content);
    addInput("photoData", resizedPhotoData);
    addInput("photoName", resizedPhotoName);
    addInput("photoType", resizedPhotoType);

    document.body.appendChild(form);
    form.submit();

    setTimeout(function(){
        alert("후기가 등록되었습니다. 관리자 확인 후 공개됩니다.");
        window.location.href = "reviews.html";
    }, 3000);
}
</script>

</body>
</html>
