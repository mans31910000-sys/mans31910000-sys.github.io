<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>업무협약 문의</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    text-align:center;
    margin:0;
    padding:30px;
}

.card{
    background:white;
    max-width:560px;
    margin:40px auto;
    padding:35px 25px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

h1{
    color:#1f4fbf;
    font-size:30px;
}

p{
    font-size:18px;
    line-height:1.8;
    color:#333;
}

.box{
    background:#f5f7fa;
    border-radius:14px;
    padding:18px;
    margin:22px 0;
    font-size:17px;
    line-height:1.7;
    color:#333;
}

.highlight{
    font-weight:bold;
    color:#1f4fbf;
}

a.btn{
    display:block;
    text-decoration:none;
    background:#1f4fbf;
    color:white;
    padding:15px;
    border-radius:10px;
    margin:18px auto;
    max-width:320px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
    <h1>🤝 업무협약 문의</h1>

    <p>
        펫넷(PETNET KOREA)은<br>
        대한민국 반려견 안전 네트워크를 함께 만들어갈<br>
        협력 파트너를 기다리고 있습니다.
    </p>

    <div class="box">
        지자체 · 동물병원 · 펫샵 · 보호소 · 반려동물 관련 기업 등<br>
        반려견 안전과 보호자 연결에 관심 있는 기관 및 업체와<br>
        다양한 협업을 검토합니다.
    </div>

    <p>
        <span class="highlight">반려견 분실 예방</span>과<br>
        <span class="highlight">보호자 빠른 연결</span>을 위한 협력 문의를 환영합니다.
    </p>

    <a class="btn" href="mailto:mans31910000@gmail.com">이메일 문의하기</a>
    <a class="btn" href="index.html">홈으로 돌아가기</a>

</html>
