<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>펫넷 QR 조회</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 { color: #333; }

nav {
  margin: 15px 0;
}

nav a {
  margin: 0 8px;
  text-decoration: none;
  color: #333;
  font-weight: bold;
}

.card {
  background: white;
  max-width: 420px;
  margin: 25px auto;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

.qr-frame {
  display: inline-block;
  padding: 14px;
  border: 4px solid #222;
  border-radius: 18px;
  background: white;
  margin: 15px 0;
}

.brand-text {
  font-size: 13px;
  font-weight: bold;
  color: #222;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.qr-frame img {
  width: 210px;
  height: 210px;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #222;
  color: white;
  font-size: 15px;
  cursor: pointer;
  margin: 6px;
}

select {
  padding: 10px;
  border-radius: 8px;
  margin: 10px;
}

.print-area {
  margin-top: 25px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.print-qr {
  background: white;
  padding: 10px;
  border: 2px solid #222;
  border-radius: 12px;
}

.print-qr p {
  font-size: 11px;
  font-weight: bold;
  margin: 4px 0;
}

.print-qr img {
  width: 110px;
  height: 110px;
}

@media print {
  body * {
    visibility: hidden;
  }

  #printArea, #printArea * {
    visibility: visible;
  }

  #printArea {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
  }

  .print-area {
    grid-template-columns: repeat(4, 1fr);
  }
}
</style>
</head>

<body>

<h1>🐶 펫넷</h1>

<nav>
  <a href="index.html">홈</a>
  <a href="register.html">반려견 등록</a>
  <a href="lost.html">분실 신고</a>
</nav>

<hr>

<div class="card">
  <h2>반려견 정보</h2>

  <p><strong>이름 :</strong> 콩이</p>
  <p><strong>견종 :</strong> 말티즈</p>
  <p><strong>특이사항 :</strong> 겁이 많아요</p>

  <a href="contact.html">
    <button>보호자에게 연락하기</button>
  </a>

  <hr>

  <h3>펫넷 QR</h3>

  <div class="qr-frame">
    <div class="brand-text">PETNET · 대한민국 반려견 안전 네트워크</div>
    <img id="mainQR" src="" alt="펫넷 QR">
    <div class="brand-text">QR 스캔 시 보호자 연결</div>
  </div>

  <h3>출력 개수 선택</h3>

  <select id="qrCount">
    <option value="1">1장</option>
    <option value="2">2장</option>
    <option value="4">4장</option>
    <option value="8">8장</option>
    <option value="16">16장</option>
  </select>

  <br>

  <button onclick="makePrintQR()">선택한 개수 만들기</button>
  <button onclick="window.print()">출력하기</button>
</div>

<div id="printArea" class="print-area"></div>

<script>
const qrLink = "https://mans31910000-sys.github.io/petnet/qr.html";

const qrImageUrl =
  "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
  encodeURIComponent(qrLink);

document.getElementById("mainQR").src = qrImageUrl;

function makePrintQR() {
  const count = parseInt(document.getElementById("qrCount").value);
  const printArea = document.getElementById("printArea");

  printArea.innerHTML = "";

  for (let i = 0; i < count; i++) {
    const box = document.createElement("div");
    box.className = "print-qr";

    box.innerHTML = `
      <p>PETNET</p>
      <p>대한민국 반려견 안전 네트워크</p>
      <img src="${qrImageUrl}" alt="펫넷 QR">
      <p>QR 스캔 시 보호자 연결</p>
    `;

    printArea.appendChild(box);
  }
}

makePrintQR();
</script>

</body>
</html>
