<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>펫넷 QR 출력</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  text-align: center;
  margin: 0;
  padding: 20px;
}

.card {
  background: white;
  max-width: 420px;
  margin: 25px auto;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

h1 {
  color: #005bd8;
}

select, button {
  width: 85%;
  max-width: 330px;
  padding: 14px;
  margin: 10px auto;
  font-size: 17px;
  border-radius: 10px;
  box-sizing: border-box;
}

button {
  border: none;
  background: #005bd8;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.home-btn {
  display:block;
  width:85%;
  max-width:330px;
  padding:14px;
  margin:10px auto;
  border-radius:10px;
  text-decoration:none;
  background:white;
  color:#005bd8;
  border:2px solid #005bd8;
  font-weight:bold;
  box-sizing:border-box;
}

.print-area {
  margin-top: 25px;
  display: grid;
  gap: 15px;
  justify-content: center;
}

.print-qr {
  background: white;
  border: 2px solid #222;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
}

.print-qr p {
  font-size: 13px;
  font-weight: bold;
  margin: 5px 0;
}

.print-qr img {
  display:block;
  margin:8px auto;
}

.notice {
  font-size:14px;
  color:#555;
  line-height:1.6;
  margin-top:15px;
}

@media print {
  @page {
    size: A4;
    margin: 8mm;
  }

  body {
    background: white;
    padding: 0;
    margin: 0;
  }

  .card {
    display: none !important;
  }

  #printArea {
    display: grid !important;
    width: 100%;
    margin: 0;
    padding: 0;
    gap: 8mm;
    justify-content: center;
    align-items: start;
  }

  .print-qr {
    page-break-inside: avoid;
    break-inside: avoid;
    box-shadow: none;
  }

  .print-qr p {
    font-size: 10pt;
    margin: 3mm 0;
  }
}
</style>
</head>

<body>

<div class="card">
  <h1>🐶 펫넷 QR 출력</h1>

  <p>
    출력할 QR 개수를 선택하세요.<br>
    선택한 크기대로 A4에 출력됩니다.
  </p>

  <select id="qrOption">
    <option value="1|10">1장 - 10cm × 10cm</option>
    <option value="2|7">2장 - 7cm × 7cm</option>
    <option value="4|5">4장 - 5cm × 5cm</option>
    <option value="8|3.5">8장 - 3.5cm × 3.5cm</option>
  </select>

  <button onclick="makePrintQR()">선택한 크기로 만들기</button>
  <button onclick="printQR()">출력하기</button>

  <a href="index.html" class="home-btn">홈으로 돌아가기</a>

  <div class="notice">
    인쇄 설정은 A4 / 배율 100%로 출력해주세요.<br>
    QR 인식률을 위해 16장 출력은 제공하지 않습니다.
  </div>
</div>

<div id="printArea" class="print-area"></div>

<script>
const params = new URLSearchParams(window.location.search);
const petId = params.get("id") || "PET000078";

const petPageUrl =
  "https://mans31910000-sys.github.io/pet.html?id=" + encodeURIComponent(petId);

const qrImageUrl =
  "https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=" +
  encodeURIComponent(petPageUrl);

function makePrintQR() {
  const option = document.getElementById("qrOption").value.split("|");
  const count = parseInt(option[0]);
  const size = option[1];

  const printArea = document.getElementById("printArea");
  printArea.innerHTML = "";

  if(count === 1){
    printArea.style.gridTemplateColumns = "1fr";
  }else if(count === 2){
    printArea.style.gridTemplateColumns = "repeat(2, auto)";
  }else if(count === 4){
    printArea.style.gridTemplateColumns = "repeat(2, auto)";
  }else{
    printArea.style.gridTemplateColumns = "repeat(4, auto)";
  }

  for (let i = 0; i < count; i++) {
    const box = document.createElement("div");
    box.className = "print-qr";

    box.innerHTML =
      '<p>' + petId + '</p>' +
      '<img src="' + qrImageUrl + '" style="width:' + size + 'cm; height:' + size + 'cm;">' +
      '<p>PETNET KOREA</p>';

    printArea.appendChild(box);
  }
}

function printQR() {
  alert("인쇄 설정에서 용지 A4, 배율 100%로 출력해주세요.");
  window.print();
}

makePrintQR();
</script>

</body>
</html>
