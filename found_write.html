<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발견동물 제보하기 | PETNET KOREA</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(0,102,204,0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(76,175,80,0.16), transparent 35%),
        linear-gradient(180deg, #f5f9ff 0%, #eef6f1 100%);
    color:#111;
    padding:18px;
    min-height:100vh;
}

.card{
    background:white;
    width:100%;
    max-width:430px;
    margin:28px auto 0;
    padding:28px 20px 32px;
    border-radius:24px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.logo{
    width:160px;
    max-width:70%;
    margin:4px auto 20px;
    display:block;
}

h1{
    text-align:center;
    font-size:30px;
    margin:0 0 10px;
    color:#0066cc;
    font-weight:900;
}

.sub{
    text-align:center;
    font-size:15px;
    line-height:1.6;
    color:#555;
    margin-bottom:24px;
}

label{
    display:block;
    font-size:17px;
    font-weight:900;
    margin:18px 0 8px;
}

input,
textarea,
select{
    width:100%;
    border:2px solid #dce4ef;
    border-radius:14px;
    padding:15px;
    font-size:17px;
    outline:none;
    font-family:Arial, sans-serif;
}

textarea{
    min-height:110px;
    resize:none;
}

input:focus,
textarea:focus,
select:focus{
    border-color:#0066cc;
}

.photo-preview{
    width:100%;
    height:190px;
    border-radius:18px;
    background:#eef3f8;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#999;
    font-size:17px;
    font-weight:900;
    margin-top:10px;
    overflow:hidden;
    text-align:center;
}

.photo-preview img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.contact-box{
    background:#f5f9ff;
    border:1px solid #dce8f7;
    border-radius:16px;
    padding:15px;
    margin-top:10px;
}

.contact-option{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
    font-size:16px;
    font-weight:800;
}

.contact-option input{
    width:auto;
    transform:scale(1.2);
}

#phoneBox,
#kakaoBox{
    display:none;
}

.notice{
    background:#f5f9ff;
    border:1px solid #dce8f7;
    border-radius:16px;
    padding:15px;
    margin:20px 0;
    font-size:14px;
    line-height:1.6;
    color:#444;
}

.submit-btn{
    width:100%;
    height:58px;
    border:0;
    border-radius:18px;
    background:#0066cc;
    color:white;
    font-size:20px;
    font-weight:900;
    margin-top:10px;
    cursor:pointer;
}

.home-btn{
    display:block;
    width:100%;
    height:54px;
    line-height:54px;
    margin-top:14px;
    text-align:center;
    background:#f0f0f0;
    color:#111;
    font-size:18px;
    font-weight:900;
    text-decoration:none;
    border-radius:16px;
}

@media(max-width:480px){
    body{
        padding:14px;
    }

    .card{
        padding:26px 18px 30px;
    }

    .logo{
        width:150px;
    }

    h1{
        font-size:28px;
    }

    input,
    textarea,
    select{
        font-size:16px;
    }

    .photo-preview{
        height:165px;
    }
}
</style>
</head>

<body>

<div class="card">

    <img src="petnet-logo-crop.png" class="logo" alt="PETNET KOREA 로고">

    <h1>발견동물 제보하기</h1>

    <p class="sub">
        길에서 발견한 반려동물의 정보를 남겨주세요.<br>
        작은 제보가 보호자를 찾는 데 도움이 됩니다.
    </p>

    <label>동물 종류</label>
    <select id="animalType">
        <option value="">선택해주세요</option>
        <option value="강아지">강아지</option>
        <option value="고양이">고양이</option>
        <option value="기타">기타</option>
    </select>

    <label>발견 장소</label>
    <input type="text" id="foundPlace" placeholder="예: 서울 강남구 ○○공원 근처">

    <label>발견 날짜</label>
    <input type="date" id="foundDate">

    <label>털 색상</label>
    <input type="text" id="color" placeholder="예: 흰색, 갈색, 검정색">

    <label>특징</label>
    <textarea id="feature" placeholder="예: 빨간 목줄 착용, 겁이 많음, 다리를 절뚝임"></textarea>

    <label>사진 선택</label>
    <input type="file" id="photoFile" accept="image/*" onchange="previewPhoto()">

    <div id="photoPreview" class="photo-preview">
        사진을 선택하면 여기에 표시됩니다
    </div>

    <label>연락 방식 선택</label>
    <div class="contact-box">
        <label class="contact-option">
            <input type="radio" name="contactType" value="phone" onchange="changeContactType()">
            전화번호 공개
        </label>

        <label class="contact-option">
            <input type="radio" name="contactType" value="kakao" onchange="changeContactType()">
            카톡으로 연락 가능
        </label>

        <label class="contact-option">
            <input type="radio" name="contactType" value="private" onchange="changeContactType()">
            연락처 비공개
        </label>
    </div>

    <div id="phoneBox">
        <label>제보자 연락처</label>
        <input type="tel" id="phone" placeholder="숫자만 입력해주세요">
    </div>

    <div id="kakaoBox">
        <label>카카오 오픈채팅 링크</label>
        <input type="text" id="kakaoLink" placeholder="https://open.kakao.com/o/...">
    </div>

    <div class="notice">
        ✅ 발견 장소와 특징은 자세히 적을수록 좋습니다.<br>
        ✅ 사진은 자동으로 저장되어 제보 목록에 표시됩니다.<br>
        ✅ 연락 방식은 제보자가 직접 선택할 수 있습니다.
    </div>

    <button class="submit-btn" onclick="submitFoundReport()">
        제보 등록하기
    </button>

    <a class="home-btn" href="found.html">
        이전 화면으로 돌아가기
    </a>

</div>

<script>
var resizedPhotoData = "";
var resizedPhotoName = "";
var resizedPhotoType = "";

function changeContactType(){
    var selected = document.querySelector('input[name="contactType"]:checked');
    var phoneBox = document.getElementById("phoneBox");
    var kakaoBox = document.getElementById("kakaoBox");

    phoneBox.style.display = "none";
    kakaoBox.style.display = "none";

    if(!selected){
        return;
    }

    if(selected.value === "phone"){
        phoneBox.style.display = "block";
    }

    if(selected.value === "kakao"){
        kakaoBox.style.display = "block";
    }
}

function previewPhoto(){
    var fileInput = document.getElementById("photoFile");
    var file = fileInput.files[0];

    if(!file){
        return;
    }

    resizedPhotoName = file.name;
    resizedPhotoType = "image/jpeg";

    var reader = new FileReader();

    reader.onload = function(e){
        var img = new Image();

        img.onload = function(){
            var canvas = document.createElement("canvas");
            var maxWidth = 900;
            var maxHeight = 900;
            var width = img.width;
            var height = img.height;

            if(width > height){
                if(width > maxWidth){
                    height = height * (maxWidth / width);
                    width = maxWidth;
                }
            }else{
                if(height > maxHeight){
                    width = width * (maxHeight / height);
                    height = maxHeight;
                }
            }

            canvas.width = width;
            canvas.height = height;

            var ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            resizedPhotoData = canvas.toDataURL("image/jpeg", 0.75);

            document.getElementById("photoPreview").innerHTML =
                '<img src="' + resizedPhotoData + '" alt="선택한 사진">';
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
}

function getContactType(){
    var selected = document.querySelector('input[name="contactType"]:checked');

    if(!selected){
        return "";
    }

    return selected.value;
}

function submitFoundReport(){
    var animalType = document.getElementById("animalType").value.trim();
    var foundPlace = document.getElementById("foundPlace").value.trim();
    var foundDate = document.getElementById("foundDate").value;
    var color = document.getElementById("color").value.trim();
    var feature = document.getElementById("feature").value.trim();
    var phone = document.getElementById("phone").value.trim().replace(/[^0-9]/g, "");
    var contactType = getContactType();
    var kakaoLink = document.getElementById("kakaoLink").value.trim();
    var memberEmail = (localStorage.getItem("petnetEmail") || "").trim().toLowerCase();

    if(animalType === "" || foundPlace === ""){
        alert("동물 종류와 발견 장소는 꼭 입력해주세요.");
        return;
    }

    if(contactType === ""){
        alert("연락 방식을 선택해주세요.");
        return;
    }

    if(contactType === "phone"){
        if(!/^[0-9]{10,11}$/.test(phone)){
            alert("연락처는 숫자만 입력하고 10~11자리로 입력해주세요.");
            return;
        }
    }

    if(contactType === "kakao"){
        if(kakaoLink === ""){
            alert("카카오 오픈채팅 링크를 입력해주세요.");
            return;
        }

        if(kakaoLink.indexOf("open.kakao.com") === -1){
            alert("카카오 오픈채팅 링크를 입력해주세요.");
            return;
        }
    }

    var submitBtn = document.querySelector(".submit-btn");
    submitBtn.disabled = true;
    submitBtn.innerText = "제보 저장 중...";

    var iframe = document.createElement("iframe");
    iframe.name = "hiddenFrame";
    iframe.style.display = "none";
    document.body.appendChild(iframe);

    var form = document.createElement("form");
    form.method = "POST";
    form.action = "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec";
    form.target = "hiddenFrame";
    form.style.display = "none";

    function addInput(name, value){
        var input = document.createElement("input");
        input.type = "hidden";
        input.name = name;
        input.value = value;
        form.appendChild(input);
    }

    addInput("action", "found");
    addInput("animalType", animalType);
    addInput("foundPlace", foundPlace);
    addInput("foundDate", foundDate);
    addInput("color", color);
    addInput("feature", feature);
    addInput("phone", phone);
    addInput("contactType", contactType);
    addInput("kakaoLink", kakaoLink);
    addInput("memberEmail", memberEmail);
    addInput("photoData", resizedPhotoData);
    addInput("photoName", resizedPhotoName);
    addInput("photoType", resizedPhotoType);

    document.body.appendChild(form);
    form.submit();

    setTimeout(function(){
        alert("발견동물 제보가 저장되었습니다.");
        window.location.href = "found.html";
    }, 3000);
}
</script>

</body>
</html>
