<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입양 희망 신청 목록 | PETNET KOREA</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(0,102,204,0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(76,175,80,0.16), transparent 35%),
        linear-gradient(180deg, #f5f9ff 0%, #eef6f1 100%);
    color:#111;
    padding:16px;
    min-height:100vh;
}

.wrap{
    width:100%;
    max-width:760px;
    margin:0 auto;
}

.header{
    background:white;
    border-radius:24px;
    padding:26px 18px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    margin:28px 0 18px;
}

.logo{
    width:155px;
    max-width:70%;
    margin:0 auto 16px;
    display:block;
}

h1{
    margin:0;
    font-size:28px;
    color:#0066cc;
    font-weight:900;
    line-height:1.3;
}

.sub{
    margin:12px 0 0;
    font-size:15px;
    line-height:1.6;
    color:#555;
}

.list{
    margin-top:18px;
}

.request-card{
    background:white;
    border-radius:22px;
    padding:20px 18px;
    margin-bottom:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.request-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
}

.type{
    font-size:22px;
    font-weight:900;
    color:#111;
}

.date{
    font-size:13px;
    color:#777;
    white-space:nowrap;
}

.info{
    font-size:16px;
    line-height:1.8;
    color:#333;
}

.info strong{
    color:#0066cc;
}

.contact-area{
    margin-top:16px;
}

.contact-btn{
    display:block;
    width:100%;
    text-align:center;
    text-decoration:none;
    border-radius:14px;
    padding:14px 12px;
    font-size:17px;
    font-weight:900;
}

.phone-btn{
    background:#0066cc;
    color:white;
}

.kakao-btn{
    background:#ffe812;
    color:#111;
}

.private-label{
    width:100%;
    border-radius:14px;
    padding:14px 12px;
    background:#f1f1f1;
    color:#666;
    text-align:center;
    font-size:16px;
    font-weight:900;
}

.empty,
.loading{
    background:white;
    border-radius:20px;
    padding:28px 18px;
    text-align:center;
    color:#777;
    font-size:17px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.btns{
    display:flex;
    gap:10px;
    margin:20px 0 30px;
}

.btn{
    flex:1;
    height:52px;
    line-height:52px;
    text-align:center;
    border-radius:16px;
    text-decoration:none;
    font-size:17px;
    font-weight:900;
}

.write-btn{
    background:#0066cc;
    color:white;
}

.home-btn{
    background:white;
    color:#111;
    border:2px solid #ddd;
}

@media(max-width:480px){
    body{
        padding:14px;
    }

    .header{
        margin-top:18px;
        padding:24px 16px;
    }

    h1{
        font-size:25px;
    }

    .type{
        font-size:20px;
    }

    .info{
        font-size:15px;
    }

    .btn,
    .contact-btn{
        font-size:15px;
    }
}
</style>
</head>

<body>

<div class="wrap">

    <div class="header">
        <img src="petnet-logo-crop.png" class="logo" alt="PETNET KOREA 로고">

        <h1>🐾 입양 희망 신청 목록</h1>

        <p class="sub">
            반려견 입양을 희망하는 분들의 신청 목록입니다.<br>
            희망 지역과 내용을 확인하고 직접 연락할 수 있습니다.
        </p>
    </div>

    <div id="list" class="list">
        <div class="loading">입양 희망 신청을 불러오는 중입니다...</div>
    </div>

    <div class="btns">
        <a class="btn write-btn" href="found_write.html">입양 희망 신청</a>
        <a class="btn home-btn" href="index.html">홈으로</a>
    </div>

</div>

<script>
var API_URL =
    "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec";

function escapeHtml(value){
    return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function makeContactArea(item){
    var contactType = item.contactType || "";
    var phone = String(item.phone || "").replace(/[^0-9]/g, "");
    var kakaoLink = String(item.kakaoLink || "").trim();

    if(contactType === "phone" && phone !== ""){
        return '<div class="contact-area">' +
            '<a class="contact-btn phone-btn" href="tel:' +
            phone +
            '">전화로 연락하기</a>' +
        '</div>';
    }

    if(contactType === "kakao" && kakaoLink !== ""){
        return '<div class="contact-area">' +
            '<a class="contact-btn kakao-btn" href="' +
            escapeHtml(kakaoLink) +
            '" target="_blank" rel="noopener">카톡으로 연락하기</a>' +
        '</div>';
    }

    if(contactType === "private"){
        return '<div class="contact-area">' +
            '<div class="private-label">연락처 비공개</div>' +
        '</div>';
    }

    return '<div class="contact-area">' +
        '<div class="private-label">연락 방식 미선택</div>' +
    '</div>';
}

function loadAdoptionRequests(){
    fetch(API_URL + "?action=foundList")
    .then(function(response){
        return response.json();
    })
    .then(function(data){
        var list = document.getElementById("list");
        list.innerHTML = "";

        if(!data || data.length === 0){
            list.innerHTML =
                '<div class="empty">아직 등록된 입양 희망 신청이 없습니다.</div>';
            return;
        }

        data.slice().reverse().forEach(function(item){
            var card = document.createElement("div");
            card.className = "request-card";

            card.innerHTML =
                '<div class="request-top">' +
                    '<div class="type">🐾 ' +
                    escapeHtml(item.animalType || "희망 동물 미입력") +
                    '</div>' +
                    '<div class="date">' +
                    escapeHtml(item.reportDate || "") +
                    '</div>' +
                '</div>' +

                '<div class="info">' +
                    '<div><strong>입양 희망 지역</strong> : ' +
                    escapeHtml(item.foundPlace || "-") +
                    '</div>' +

                    '<div><strong>희망 내용</strong> : ' +
                    escapeHtml(item.feature || "-") +
                    '</div>' +
                '</div>' +

                makeContactArea(item);

            list.appendChild(card);
        });
    })
    .catch(function(){
        document.getElementById("list").innerHTML =
            '<div class="empty">입양 희망 신청 목록을 불러오지 못했습니다.</div>';
    });
}

loadAdoptionRequests();
</script>

</body>
</html>
