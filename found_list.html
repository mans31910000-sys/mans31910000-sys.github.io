<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제보 목록 보기 | PETNET KOREA</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(0,102,204,0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(76,175,80,0.16), transparent 35%),
        linear-gradient(180deg, #f5f9ff 0%, #eef6f1 100%);
    color:#111;
    padding:16px;
    min-height:100vh;
}

.wrap{
    width:100%;
    max-width:760px;
    margin:0 auto;
}

.header{
    background:white;
    border-radius:24px;
    padding:26px 18px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    margin:28px 0 18px;
}

.logo{
    width:155px;
    max-width:70%;
    margin:0 auto 16px;
    display:block;
}

h1{
    margin:0;
    font-size:30px;
    color:#0066cc;
    font-weight:900;
}

.sub{
    margin:12px 0 0;
    font-size:15px;
    line-height:1.6;
    color:#555;
}

.list{
    margin-top:18px;
}

.report-card{
    background:white;
    border-radius:20px;
    padding:20px 18px;
    margin-bottom:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.report-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.type{
    font-size:22px;
    font-weight:900;
    color:#111;
}

.date{
    font-size:13px;
    color:#777;
}

.info{
    font-size:16px;
    line-height:1.7;
    color:#333;
}

.info strong{
    color:#0066cc;
}

.empty{
    background:white;
    border-radius:20px;
    padding:28px 18px;
    text-align:center;
    color:#777;
    font-size:17px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.btns{
    display:flex;
    gap:10px;
    margin:20px 0 30px;
}

.btn{
    flex:1;
    height:52px;
    line-height:52px;
    text-align:center;
    border-radius:16px;
    text-decoration:none;
    font-size:17px;
    font-weight:900;
}

.write-btn{
    background:#0066cc;
    color:white;
}

.home-btn{
    background:white;
    color:#111;
    border:2px solid #ddd;
}

.loading{
    background:white;
    border-radius:20px;
    padding:28px 18px;
    text-align:center;
    color:#555;
    font-size:17px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

@media(max-width:480px){
    body{
        padding:14px;
    }

    .header{
        margin-top:18px;
        padding:24px 16px;
    }

    h1{
        font-size:28px;
    }

    .type{
        font-size:20px;
    }

    .info{
        font-size:15px;
    }

    .btn{
        font-size:15px;
    }
}
</style>
</head>

<body>

<div class="wrap">

    <div class="header">
        <img src="petnet-logo-crop.png" class="logo" alt="PETNET KOREA 로고">

        <h1>유기견 · 발견동물 제보 목록</h1>

        <p class="sub">
            등록된 발견동물 제보를 확인할 수 있습니다.<br>
            보호자를 찾는 데 도움이 되는 정보입니다.
        </p>
    </div>

    <div id="list" class="list">
        <div class="loading">제보 목록을 불러오는 중...</div>
    </div>

    <div class="btns">
        <a class="btn write-btn" href="found_write.html">제보하기</a>
        <a class="btn home-btn" href="found.html">이전으로</a>
    </div>

</div>

<script>
var API_URL = "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec";

function loadFoundList(){
    fetch(API_URL + "?action=foundList")
    .then(function(response){
        return response.json();
    })
    .then(function(data){
        var list = document.getElementById("list");
        list.innerHTML = "";

        if(!data || data.length === 0){
            list.innerHTML = '<div class="empty">아직 등록된 제보가 없습니다.</div>';
            return;
        }

        data.reverse().forEach(function(item){
            var card = document.createElement("div");
            card.className = "report-card";

            card.innerHTML =
                '<div class="report-top">' +
                    '<div class="type">🐾 ' + (item.animalType || "발견동물") + '</div>' +
                    '<div class="date">' + (item.reportDate || "") + '</div>' +
                '</div>' +
                '<div class="info">' +
                    '<div><strong>발견 장소</strong> : ' + (item.foundPlace || "-") + '</div>' +
                    '<div><strong>발견 날짜</strong> : ' + (item.foundDate || "-") + '</div>' +
                    '<div><strong>털 색상</strong> : ' + (item.color || "-") + '</div>' +
                    '<div><strong>특징</strong> : ' + (item.feature || "-") + '</div>' +
                '</div>';

            list.appendChild(card);
        });
    })
    .catch(function(){
        document.getElementById("list").innerHTML =
            '<div class="empty">제보 목록을 불러오지 못했습니다.</div>';
    });
}

loadFoundList();
</script>

</body>
</html>
