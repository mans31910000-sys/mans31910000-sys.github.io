<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>펫넷 회원센터 | PETNET KOREA</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f9ff;
    color:#0d1833;
    text-align:center;
    padding:18px;
}

.page{
    width:100%;
    max-width:470px;
    margin:0 auto;
}

.main-card{
    background:#fff;
    padding:26px 20px 30px;
    border-radius:24px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.logo{
    width:165px;
    max-width:70%;
    margin:4px auto 16px;
    display:block;
}

h1{
    margin:0;
    font-size:32px;
    color:#0066cc;
    font-weight:900;
}

.intro{
    margin:14px 0 20px;
    color:#444;
    font-size:16px;
    line-height:1.65;
}

.account-box{
    margin-bottom:22px;
    padding:15px;
    border-radius:16px;
    background:#f5f9ff;
    color:#334;
    font-size:14px;
    line-height:1.6;
}

.section{
    margin-top:30px;
    padding-top:26px;
    border-top:3px solid #e7edf5;
}

.section:first-of-type{
    margin-top:0;
    padding-top:0;
    border-top:none;
}

.section-title{
    margin:0 0 8px;
    font-size:25px;
    font-weight:900;
}

.pet-title{
    color:#0066cc;
}

.found-title{
    color:#17804b;
}

.section-desc{
    margin:0 0 18px;
    color:#666;
    font-size:14px;
    line-height:1.6;
}

.action-link,
.home-btn{
    display:block;
    width:100%;
    min-height:56px;
    line-height:56px;
    border-radius:16px;
    text-decoration:none;
    font-size:19px;
    font-weight:900;
}

.pet-register{
    margin-bottom:20px;
    background:#ff9800;
    color:#fff;
    box-shadow:0 5px 15px rgba(255,152,0,.24);
}

.found-register{
    margin-bottom:20px;
    background:#17804b;
    color:#fff;
    box-shadow:0 5px 15px rgba(23,128,75,.20);
}

.result-card{
    margin-bottom:18px;
    padding:21px 17px;
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:20px;
    box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.result-card h2{
    margin:0 0 14px;
    color:#0066cc;
    font-size:26px;
}

.result-card p{
    margin:9px 0;
    font-size:16px;
    line-height:1.5;
}

.status-badge{
    display:inline-block;
    margin:0 0 10px;
    padding:7px 13px;
    border-radius:20px;
    font-weight:900;
}

.status-normal{
    background:#eef8f2;
    color:#17804b;
}

.status-lost{
    background:#fff0f0;
    color:#c62828;
}

.found-status{
    background:#eef8f2;
    color:#17804b;
}

.found-status.closed{
    background:#f0f0f0;
    color:#666;
}

.card-btn{
    display:block;
    width:100%;
    min-height:52px;
    line-height:52px;
    margin-top:11px;
    border:none;
    border-radius:15px;
    color:#fff;
    text-decoration:none;
    font-size:17px;
    font-weight:900;
    cursor:pointer;
}

.view-btn{
    background:#36b36b;
}

.edit-btn{
    background:#0066cc;
}

.lost-btn{
    background:#cc3333;
}

.found-btn{
    background:#36b36b;
}

.reopen-btn{
    background:#0066cc;
}

.error-card{
    padding:20px 16px;
    background:#fff7f7;
    border:1px solid #ffd0d0;
    border-radius:18px;
}

.error-card h2{
    margin:0 0 10px;
    color:#cc3333;
    font-size:22px;
}

.error-card p{
    margin:0;
    color:#555;
    font-size:15px;
    line-height:1.6;
}

.bottom-actions{
    margin-top:30px;
    padding-top:24px;
    border-top:3px solid #e7edf5;
}

.logout-btn{
    width:100%;
    height:52px;
    margin-bottom:12px;
    border:none;
    border-radius:16px;
    background:#e53935;
    color:#fff;
    font-size:18px;
    font-weight:900;
    cursor:pointer;
}

.home-btn{
    background:#f0f0f0;
    color:#111;
}

.loading{
    margin:12px 0;
    color:#666;
    font-size:15px;
}

@media(max-width:480px){
    body{
        padding:14px;
    }

    .main-card{
        padding:24px 17px 28px;
        border-radius:22px;
    }

    .logo{
        width:150px;
    }

    h1{
        font-size:29px;
    }

    .section-title{
        font-size:23px;
    }

    .action-link,
    .home-btn{
        min-height:54px;
        line-height:54px;
        font-size:18px;
    }
}
</style>
</head>

<body>

<div class="page">
<div class="main-card">

    <img src="petnet-logo-crop.png" class="logo" alt="PETNET KOREA 로고">

    <h1>🐾 펫넷 회원센터</h1>

    <p class="intro">
        반려견 등록과 관리, 분실 신고,<br>
        발견동물 제보를 한곳에서 이용할 수 있습니다.
    </p>

    <div class="account-box" id="accountBox">
        로그인 정보를 확인하는 중입니다.
    </div>

    <section class="section">
        <h2 class="section-title pet-title">🐶 내 반려견</h2>

        <p class="section-desc">
            새 반려견을 등록하거나 기존 반려견의 정보와 상태를 관리하세요.
        </p>

        <a class="action-link pet-register" href="register.html">
            ➕ 새 반려견 등록하기
        </a>

        <div id="result"></div>
    </section>

    <section class="section">
        <h2 class="section-title found-title">🐕 유기견 · 발견동물 제보</h2>

        <p class="section-desc">
            발견동물을 새로 제보하고 내가 등록한 제보를 관리하세요.
        </p>

        <a class="action-link found-register" href="found_write.html">
            ➕ 새 발견동물 제보하기
        </a>

        <div id="foundResult"></div>
    </section>

    <div class="bottom-actions">
        <button class="logout-btn" onclick="logout()">
            🚪 로그아웃
        </button>

        <a class="home-btn" href="index.html">
            🏠 홈으로 돌아가기
        </a>
    </div>

</div>
</div>

<script>
var API_URL =
  "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec";

window.onload = function(){
  var email =
    (localStorage.getItem("petnetEmail") ||
     localStorage.getItem("memberEmail") ||
     "")
    .trim()
    .toLowerCase();

  if(!email){
    alert("로그인이 필요합니다.");
    location.href = "login.html";
    return;
  }

  document.getElementById("accountBox").innerHTML =
    "현재 로그인 계정<br><strong>" + escapeHtml(email) + "</strong>";

  loadMyPets(email);
  loadMyFound(email);
};

function escapeHtml(value){
  return String(value == null ? "" : value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function loadMyPets(email){
  document.getElementById("result").innerHTML =
    '<p class="loading">내 반려견 목록을 불러오는 중입니다...</p>';

  var oldScript = document.getElementById("myPetsScript");
  if(oldScript){
    oldScript.remove();
  }

  var script = document.createElement("script");
  script.id = "myPetsScript";
  script.src =
    API_URL +
    "?action=myPets" +
    "&memberEmail=" + encodeURIComponent(email) +
    "&callback=showMyPets";

  document.body.appendChild(script);
}

function showMyPets(data){
  var box = document.getElementById("result");

  if(!data || data.length === 0){
    box.innerHTML =
      '<div class="error-card">' +
      '<h2>등록된 반려견 없음</h2>' +
      '<p>현재 로그인 계정으로 등록된 반려견이 없습니다.</p>' +
      '</div>';
    return;
  }

  var html = "";

  data.slice().reverse().forEach(function(pet){
    var petNumber = escapeHtml(pet.petNumber || "");
    var status = String(pet.status || "정상").trim();
    var isLost = status === "분실";

    html +=
      '<div class="result-card">' +
      '<h2>' + petNumber + '</h2>' +

      '<div class="status-badge ' +
      (isLost ? "status-lost" : "status-normal") +
      '">상태 : ' + escapeHtml(status) + '</div>' +

      '<p><strong>이름 :</strong> ' +
      escapeHtml(pet.name || "-") + '</p>' +

      '<p><strong>품종 :</strong> ' +
      escapeHtml(pet.breed || "-") + '</p>' +

      '<a class="card-btn view-btn" href="pet.html?id=' +
      encodeURIComponent(pet.petNumber || "") +
      '">QR / 반려견 정보 보기</a>' +

      '<a class="card-btn edit-btn" href="edit_pet.html?id=' +
      encodeURIComponent(pet.petNumber || "") +
      '">✏️ 정보 수정 · 삭제</a>';

    if(isLost){
      html +=
        '<button class="card-btn found-btn" onclick="reportFound(\'' +
        petNumber +
        '\')">🟢 찾았어요 / 분실 해제</button>';
    }else{
      html +=
        '<button class="card-btn lost-btn" onclick="reportLost(\'' +
        petNumber +
        '\')">🔴 분실 신고하기</button>';
    }

    html += '</div>';
  });

  box.innerHTML = html;
}
function updatePetStatus(petNumber, status){
  var formData = new FormData();
  formData.append("action","updatePetStatus");
  formData.append("petId",petNumber);
  formData.append("status",status);

  fetch(API_URL,{
    method:"POST",
    body:formData
  })
  .then(function(response){
    return response.text();
  })
  .then(function(result){

    result=result.trim();

    if(result==="status_success"){

      alert(
        status==="분실"
        ? "분실 신고가 완료되었습니다."
        : "분실 상태가 해제되었습니다."
      );

      var email=
        (localStorage.getItem("petnetEmail")||
        localStorage.getItem("memberEmail")||
        "")
        .trim()
        .toLowerCase();

      loadMyPets(email);
      return;
    }

    alert("처리 중 문제가 발생했습니다.");
  })
  .catch(function(){
    alert("연결 오류가 발생했습니다.");
  });
}

function reportLost(petNumber){

  if(confirm(petNumber+" 반려견을 분실 신고하시겠습니까?")){
    updatePetStatus(petNumber,"분실");
  }

}

function reportFound(petNumber){

  if(confirm(petNumber+" 반려견의 분실 상태를 해제하시겠습니까?")){
    updatePetStatus(petNumber,"정상");
  }

}

function loadMyFound(email){

  document.getElementById("foundResult").innerHTML=
  '<p class="loading">내 발견동물 제보를 불러오는 중입니다...</p>';

  var oldScript=document.getElementById("myFoundScript");

  if(oldScript){
    oldScript.remove();
  }

  var script=document.createElement("script");

  script.id="myFoundScript";

  script.src=
    API_URL+
    "?action=myFound"+
    "&memberEmail="+encodeURIComponent(email)+
    "&callback=showMyFound";

  document.body.appendChild(script);

}

function showMyFound(data){

  var box=document.getElementById("foundResult");

  if(!data||data.length===0){

    box.innerHTML=
      '<div class="error-card">'+
      '<h2>등록된 제보 없음</h2>'+
      '<p>현재 로그인 계정으로 등록된 발견동물 제보가 없습니다.</p>'+
      '</div>';

    return;
  }

  var html="";

  data.reverse().forEach(function(item){

    var status=item.status||"진행중";

    html+=
      '<div class="result-card">'+

      '<h2>'+item.foundNumber+'</h2>'+

      '<div class="status-badge found-status">'+
      '상태 : '+status+
      '</div>'+

      '<p><strong>동물 종류 :</strong> '+(item.animalType||"-")+'</p>'+
      '<p><strong>발견 장소 :</strong> '+(item.foundPlace||"-")+'</p>'+
      '<p><strong>발견 날짜 :</strong> '+(item.foundDate||"-")+'</p>'+
      '<p><strong>털 색상 :</strong> '+(item.color||"-")+'</p>'+
      '<p><strong>특징 :</strong> '+(item.feature||"-")+'</p>'+

      '<a class="card-btn view-btn" href="found_list.html">'+
      '👁 발견동물 제보 목록 보기'+
      '</a>';

    if(status==="종료"){

      html+=
      '<button class="card-btn reopen-btn" onclick="changeFoundStatus(\''+
      item.foundNumber+
      '\',\'진행중\')">'+
      '🔄 다시 제보하기'+
      '</button>';

    }else{

      html+=
      '<button class="card-btn found-btn" onclick="changeFoundStatus(\''+
      item.foundNumber+
      '\',\'종료\')">'+
      '🟢 보호자 찾았어요 / 제보 종료'+
      '</button>';

    }

    html+='</div>';

  });

  box.innerHTML=html;

}

function changeFoundStatus(foundNumber,status){

  var email=
    (localStorage.getItem("petnetEmail")||
    localStorage.getItem("memberEmail")||
    "")
    .trim()
    .toLowerCase();

  if(!confirm(
    status==="종료"
    ? foundNumber+" 제보를 종료하시겠습니까?"
    : foundNumber+" 제보를 다시 공개하시겠습니까?"
  )){
    return;
  }

  var formData=new FormData();

  formData.append("action","updateFoundStatus");
  formData.append("foundNumber",foundNumber);
  formData.append("memberEmail",email);
  formData.append("status",status);

  fetch(API_URL,{
    method:"POST",
    body:formData
  })
  .then(function(response){
    return response.text();
  })
  .then(function(result){

    result=result.trim();

    if(result==="found_status_success"){

      alert(
        status==="종료"
        ? "발견동물 제보가 종료되었습니다."
        : "발견동물 제보가 다시 공개되었습니다."
      );

      loadMyFound(email);
      return;
    }

    alert("처리 중 문제가 발생했습니다.");

  })
  .catch(function(){
    alert("연결 오류가 발생했습니다.");
  });

}

function logout(){

  if(!confirm("로그아웃하시겠습니까?")){
    return;
  }

  localStorage.removeItem("petnetEmail");
  localStorage.removeItem("memberEmail");

  alert("로그아웃되었습니다.");

  location.href="index.html";

}

</script>

</body>
</html>
