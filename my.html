<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 반려견 관리 | PETNET KOREA</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f9ff;
    color:#0d1833;
    text-align:center;
    padding:18px;
}

.card{
    background:white;
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:26px 22px 30px;
    border-radius:24px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.logo{
    width:170px;
    max-width:70%;
    margin:4px auto 18px;
    display:block;
}

h1{
    margin:0;
    font-size:34px;
    color:#0066cc;
    font-weight:900;
}

.desc{
    font-size:17px;
    line-height:1.6;
    margin:18px 0 22px;
    color:#222;
}

.notice{
    background:#f5f9ff;
    border-radius:18px;
    padding:18px 16px;
    margin-bottom:22px;
    font-size:15px;
    line-height:1.6;
    color:#333;
}

.input-box{
    width:100%;
    height:56px;
    margin-bottom:14px;
    padding:0 16px;
    font-size:17px;
    border:1px solid #d5dce8;
    border-radius:14px;
    outline:none;
    background:#fff;
}

.input-box:focus{
    border-color:#0066cc;
    box-shadow:0 0 0 3px rgba(0,102,204,0.12);
}

.search-btn{
    width:100%;
    height:60px;
    margin-top:8px;
    font-size:22px;
    font-weight:900;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:16px;
    cursor:pointer;
}

.home-btn{
    display:block;
    width:100%;
    height:52px;
    line-height:52px;
    margin-top:16px;
    font-size:18px;
    font-weight:800;
    background:#f0f0f0;
    color:#111;
    text-decoration:none;
    border-radius:16px;
}

#result{
    margin-top:24px;
}

.result-card{
    background:#ffffff;
    border:1px solid #e2e8f0;
    border-radius:20px;
    padding:22px 18px;
    box-shadow:0 5px 18px rgba(0,0,0,0.06);
}

.result-card h2{
    margin:0 0 16px;
    color:#0066cc;
    font-size:28px;
}

.result-card p{
    font-size:17px;
    margin:10px 0;
    line-height:1.5;
}

.error-card{
    background:#fff7f7;
    border:1px solid #ffd0d0;
    border-radius:18px;
    padding:20px 16px;
}

.error-card h2{
    margin:0 0 12px;
    color:#cc3333;
    font-size:24px;
}

.error-card p{
    font-size:16px;
    line-height:1.6;
    margin:0;
}

.pet-view-btn{
    display:block;
    width:100%;
    height:54px;
    line-height:54px;
    margin-top:20px;
    background:#36b36b;
    color:white;
    font-size:19px;
    font-weight:900;
    border-radius:16px;
    text-decoration:none;
}

.tip{
    margin-top:18px;
    font-size:13px;
    color:#777;
    line-height:1.5;
}

@media(max-width:480px){
    body{
        padding:14px;
    }

    .card{
        padding:24px 18px 28px;
        border-radius:22px;
    }

    .logo{
        width:155px;
        margin-bottom:16px;
    }

    h1{
        font-size:32px;
    }

    .desc{
        font-size:16px;
        margin:16px 0 20px;
    }

    .notice{
        font-size:14px;
        padding:16px 14px;
    }

    .input-box{
        height:54px;
        font-size:16px;
    }

    .search-btn{
        height:58px;
        font-size:21px;
    }

    .home-btn{
        height:50px;
        line-height:50px;
        font-size:17px;
    }
}
</style>
</head>

<body>

<div class="card">

    <img src="petnet-logo-crop.png" class="logo" alt="PETNET KOREA 로고">

    <h1>🐶 내 반려견 관리</h1>

    <p class="desc">
        등록한 PET번호와<br>
        보호자 연락처를 입력하면<br>
        내 반려견 정보를 확인할 수 있습니다.
    </p>

    <div class="notice">
        ✅ QR 등록 후 발급받은 PET번호를 입력하세요.<br>
        ✅ 연락처는 숫자만 입력해주세요.<br>
        ✅ 정보가 일치하면 반려견 페이지로 이동할 수 있습니다.
    </div>

    <input id="petId" class="input-box" type="text" placeholder="PET번호 예: PET000001">

    <input id="phone" class="input-box" type="tel" placeholder="보호자 연락처 예: 01012345678">

    <button id="searchBtn" class="search-btn" onclick="findPet()">
        내 반려견 찾기
    </button>

    <div id="result"></div>

    <a class="home-btn" href="index.html">
        🏠 홈으로 돌아가기
    </a>

    <div class="tip">
        PET번호는 QR 생성 완료 화면 또는 저장한 QR 정보에서 확인할 수 있습니다.
    </div>

</div>

<script>
function findPet() {
  var petId = document.getElementById("petId").value.trim().toUpperCase();
  var phone = document.getElementById("phone").value.trim().replace(/[^0-9]/g, "");
  var searchBtn = document.getElementById("searchBtn");

  if (petId === "" || phone === "") {
    alert("PET번호와 보호자 연락처를 입력해주세요.");
    return;
  }

  if (!/^PET[0-9]{6}$/.test(petId)) {
    alert("PET번호 형식이 올바르지 않습니다. 예: PET000001");
    return;
  }

  if (!/^[0-9]{10,11}$/.test(phone)) {
    alert("전화번호는 숫자만 입력하고 10~11자리로 입력해주세요. 예: 01012345678");
    return;
  }

  searchBtn.disabled = true;
  searchBtn.innerText = "조회 중...";

  document.getElementById("result").innerHTML =
    '<p style="font-size:17px; color:#666;">반려견 정보를 조회 중입니다...</p>';

  var oldScript = document.getElementById("petSearchScript");
  if(oldScript){
    oldScript.remove();
  }

  var script = document.createElement("script");
  script.id = "petSearchScript";
  script.src =
    "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec" +
    "?petid=" + encodeURIComponent(petId) +
    "&phone=" + encodeURIComponent(phone) +
    "&callback=showResult";

  document.body.appendChild(script);
}

function showResult(data){
  var searchBtn = document.getElementById("searchBtn");
  searchBtn.disabled = false;
  searchBtn.innerText = "내 반려견 찾기";

  if(!data.success){
    document.getElementById("result").innerHTML =
      '<div class="error-card">' +
      '<h2>조회 결과 없음</h2>' +
      '<p>' +
      'PET번호 또는 보호자 연락처가 일치하지 않습니다.<br>' +
      '입력 정보를 다시 확인해주세요.' +
      '</p>' +
      '</div>';
    return;
  }

  document.getElementById("result").innerHTML =
    '<div class="result-card">' +
    '<h2>' + data.petNumber + '</h2>' +
    '<p><strong>이름 :</strong> ' + data.name + '</p>' +
    '<p><strong>품종 :</strong> ' + data.breed + '</p>' +
    '<p><strong>성별 :</strong> ' + data.gender + '</p>' +
    '<p><strong>특징 :</strong> ' + data.feature + '</p>' +
    '<a class="pet-view-btn" href="pet.html?id=' + data.petNumber + '">' +
    '반려견 정보 보기' +
    '</a>' +
    '</div>';
}
</script>

</body>
</html>
