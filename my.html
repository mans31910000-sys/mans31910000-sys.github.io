<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 반려견 관리 | PETNET KOREA</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f9ff;
    color:#0d1833;
    text-align:center;
    padding:18px;
}

.card{
    background:white;
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:26px 22px 30px;
    border-radius:24px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.logo{
    width:170px;
    max-width:70%;
    margin:4px auto 18px;
    display:block;
}

h1{
    margin:0;
    font-size:34px;
    color:#0066cc;
    font-weight:900;
}

.desc{
    font-size:17px;
    line-height:1.6;
    margin:18px 0 22px;
    color:#222;
}

.notice{
    background:#f5f9ff;
    border-radius:18px;
    padding:18px 16px;
    margin-bottom:22px;
    font-size:15px;
    line-height:1.6;
    color:#333;
}

.input-box{
    width:100%;
    height:56px;
    margin-bottom:14px;
    padding:0 16px;
    font-size:17px;
    border:1px solid #d5dce8;
    border-radius:14px;
    outline:none;
    background:#fff;
}

.input-box:focus{
    border-color:#0066cc;
    box-shadow:0 0 0 3px rgba(0,102,204,0.12);
}

.search-btn{
    width:100%;
    height:60px;
    margin-top:8px;
    font-size:22px;
    font-weight:900;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:16px;
    cursor:pointer;
}

.home-btn{
    display:block;
    width:100%;
    height:52px;
    line-height:52px;
    margin-top:16px;
    font-size:18px;
    font-weight:800;
    background:#f0f0f0;
    color:#111;
    text-decoration:none;
    border-radius:16px;
}

#result{
    margin-top:24px;
}

.result-card{
    background:#ffffff;
    border:1px solid #e2e8f0;
    border-radius:20px;
    padding:22px 18px;
    box-shadow:0 5px 18px rgba(0,0,0,0.06);
}

.result-card h2{
    margin:0 0 16px;
    color:#0066cc;
    font-size:28px;
}

.result-card p{
    font-size:17px;
    margin:10px 0;
    line-height:1.5;
}

.error-card{
    background:#fff7f7;
    border:1px solid #ffd0d0;
    border-radius:18px;
    padding:20px 16px;
}

.error-card h2{
    margin:0 0 12px;
    color:#cc3333;
    font-size:24px;
}

.error-card p{
    font-size:16px;
    line-height:1.6;
    margin:0;
}

.pet-view-btn{
    display:block;
    width:100%;
    height:54px;
    line-height:54px;
    margin-top:20px;
    background:#36b36b;
    color:white;
    font-size:19px;
    font-weight:900;
    border-radius:16px;
    text-decoration:none;
}

.tip{
    margin-top:18px;
    font-size:13px;
    color:#777;
    line-height:1.5;
}

@media(max-width:480px){
    body{
        padding:14px;
    }

    .card{
        padding:24px 18px 28px;
        border-radius:22px;
    }

    .logo{
        width:155px;
        margin-bottom:16px;
    }

    h1{
        font-size:32px;
    }

    .desc{
        font-size:16px;
        margin:16px 0 20px;
    }

    .notice{
        font-size:14px;
        padding:16px 14px;
    }

    .input-box{
        height:54px;
        font-size:16px;
    }

    .search-btn{
        height:58px;
        font-size:21px;
    }

    .home-btn{
        height:50px;
        line-height:50px;
        font-size:17px;
    }
}

.found-section{
    margin-top:34px;
    padding-top:28px;
    border-top:3px solid #e7edf5;
}

.found-title{
    margin:0 0 12px;
    color:#17804b;
    font-size:27px;
    font-weight:900;
}

.found-desc{
    margin:0 0 20px;
    color:#555;
    font-size:15px;
    line-height:1.6;
}

.found-status{
    display:inline-block;
    margin:5px 0 12px;
    padding:8px 14px;
    border-radius:20px;
    background:#eef8f2;
    color:#17804b;
    font-weight:900;
}

.found-end-btn{
    width:100%;
    min-height:54px;
    margin-top:12px;
    border:none;
    border-radius:16px;
    background:#36b36b;
    color:white;
    font-size:18px;
    font-weight:900;
    cursor:pointer;
}

.found-reopen-btn{
    background:#0066cc;
}

.register-btn{
    display:block;
    width:100%;
    height:58px;
    line-height:58px;
    margin:0 0 22px;
    background:#ff9800;
    color:#fff;
    text-decoration:none;
    font-size:20px;
    font-weight:900;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(255,152,0,.25);
}

.register-btn:hover{
    background:#f57c00;
}

</style>
</head>

<body>

<div class="card">

    <img src="petnet-logo-crop.png" class="logo" alt="PETNET KOREA 로고">

    <h1>🐶 내 반려견 관리</h1>

    <p class="desc">
        회원가입한 보호자는<br>
        등록한 반려견을 한눈에 확인하고<br>
        QR 보기, 정보 수정, 분실신고를 할 수 있습니다.
    </p>

<div class="notice">
    ✅ 로그인한 회원의 반려견 목록입니다.<br>
    ✅ 등록한 반려견을 한눈에 확인할 수 있습니다.<br>
    ✅ QR 보기, 분실신고, 분실해제가 가능합니다.
</div>

   <a class="register-btn" href="register.html">
    🐶 새 반려견 등록하기
</a>

    <div id="result"></div>

    <div class="found-section">
    <h2 class="found-title">🐕 내 발견동물 제보 관리</h2>

    <p class="found-desc">
        내가 등록한 발견동물 제보를 확인하고<br>
        보호자를 찾으면 제보를 종료할 수 있습니다.
    </p>

    <div id="foundResult"></div>
</div>

    <a class="home-btn" href="index.html">
        🏠 홈으로 돌아가기
    </a>

    <div class="tip">
       로그인 기반 자동 관리는 다음 단계에서 연결됩니다. 현재는 PET번호와 연락처로 먼저 조회합니다.
    </div>

</div>

<script>
function findPet() {
  var petId = document.getElementById("petId").value.trim().toUpperCase();
  var phone = document.getElementById("phone").value.trim().replace(/[^0-9]/g, "");
  var searchBtn = document.getElementById("searchBtn");

  if (petId === "" || phone === "") {
    alert("PET번호와 보호자 연락처를 입력해주세요.");
    return;
  }

  if (!/^PET[0-9]{6}$/.test(petId)) {
    alert("PET번호 형식이 올바르지 않습니다. 예: PET000001");
    return;
  }

  if (!/^[0-9]{10,11}$/.test(phone)) {
    alert("전화번호는 숫자만 입력하고 10~11자리로 입력해주세요. 예: 01012345678");
    return;
  }

  searchBtn.disabled = true;
  searchBtn.innerText = "조회 중...";

  document.getElementById("result").innerHTML =
    '<p style="font-size:17px; color:#666;">반려견 정보를 조회 중입니다...</p>';

  var oldScript = document.getElementById("petSearchScript");
  if(oldScript){
    oldScript.remove();
  }

  var script = document.createElement("script");
  script.id = "petSearchScript";
  script.src =
    "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec" +
    "?petid=" + encodeURIComponent(petId) +
    "&phone=" + encodeURIComponent(phone) +
    "&callback=showResult";

  document.body.appendChild(script);
}

function showResult(data){
  var searchBtn = document.getElementById("searchBtn");
  searchBtn.disabled = false;
  searchBtn.innerText = "내 반려견 찾기";

  if(!data.success){
    document.getElementById("result").innerHTML =
      '<div class="error-card">' +
      '<h2>조회 결과 없음</h2>' +
      '<p>' +
      'PET번호 또는 보호자 연락처가 일치하지 않습니다.<br>' +
      '입력 정보를 다시 확인해주세요.' +
      '</p>' +
      '</div>';
    return;
  }

  document.getElementById("result").innerHTML =
    '<div class="result-card">' +
    '<h2>' + data.petNumber + '</h2>' +
    '<p><strong>이름 :</strong> ' + data.name + '</p>' +
    '<p><strong>품종 :</strong> ' + data.breed + '</p>' +
    '<p><strong>성별 :</strong> ' + data.gender + '</p>' +
    '<p><strong>특징 :</strong> ' + data.feature + '</p>' +
    '<a class="pet-view-btn" href="pet.html?id=' + data.petNumber + '">' +
'QR / 반려견 정보 보기' +
'</a>' +

'<button class="pet-view-btn" style="border:none; background:#cc3333; margin-top:12px;" onclick="reportLost(\'' + data.petNumber + '\')">' +
'🔴 분실 신고하기' +
'</button>' +

'<button class="pet-view-btn" style="border:none; background:#36b36b; margin-top:12px;" onclick="reportFound(\'' + data.petNumber + '\')">' +
'🟢 찾았어요 / 분실 해제' +
'</button>' +
    '</div>';
}
function updatePetStatus(petNumber, status){
  var formData = new FormData();
  formData.append("action", "updatePetStatus");
  formData.append("petId", petNumber);
  formData.append("status", status);

  fetch("https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec", {
    method: "POST",
    body: formData
  })
  .then(function(response){
    return response.text();
  })
  .then(function(result){
    if(result === "status_success"){
      alert(status === "분실" ? "분실 신고가 완료되었습니다." : "분실 상태가 해제되었습니다.");
      findPet();
    } else {
      alert("처리 중 문제가 발생했습니다. 다시 시도해주세요.");
    }
  })
  .catch(function(){
    alert("연결 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
  });
}

function reportLost(petNumber){
  if(confirm(petNumber + " 반려견을 분실 신고하시겠습니까?")){
    updatePetStatus(petNumber, "분실");
  }
}

function reportFound(petNumber){
  if(confirm(petNumber + " 반려견의 분실 상태를 해제하시겠습니까?")){
    updatePetStatus(petNumber, "정상");
  }
}
window.onload = function(){
  var email = localStorage.getItem("petnetEmail") || "";

  if(email !== ""){
    loadMyPets(email);
    loadMyFound(email);
  }
};

function loadMyPets(email){
  document.getElementById("result").innerHTML =
    '<p style="font-size:17px; color:#666;">내 반려견 목록을 불러오는 중입니다...</p>';

  var script = document.createElement("script");
  script.src =
    "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec" +
    "?action=myPets&memberEmail=" + encodeURIComponent(email) +
    "&callback=showMyPets";

  document.body.appendChild(script);
}

function showMyPets(data){
  if(!data || data.length === 0){
    document.getElementById("result").innerHTML =
      '<div class="error-card"><h2>등록된 반려견 없음</h2><p>현재 로그인 계정으로 등록된 반려견이 없습니다.</p></div>';
    return;
  }

  var html = "";

  data.reverse().forEach(function(pet){
    html +=
      '<div class="result-card" style="margin-bottom:18px;">' +
      '<h2>' + pet.petNumber + '</h2>' +
      '<p><strong>이름 :</strong> ' + pet.name + '</p>' +
      '<p><strong>품종 :</strong> ' + pet.breed + '</p>' +
      '<p><strong>상태 :</strong> ' + pet.status + '</p>' +
      '<a class="pet-view-btn" href="pet.html?id=' + pet.petNumber + '">QR / 반려견 정보 보기</a>' +
      '<a class="pet-view-btn" style="background:#0066cc; margin-top:12px;" href="edit_pet.html?id=' + pet.petNumber + '">' +
'✏️ 정보 수정하기' +
'</a>' +
      '<button class="pet-view-btn" style="border:none; background:#cc3333; margin-top:12px;" onclick="reportLost(\'' + pet.petNumber + '\')">🔴 분실 신고하기</button>' +
      '<button class="pet-view-btn" style="border:none; background:#36b36b; margin-top:12px;" onclick="reportFound(\'' + pet.petNumber + '\')">🟢 찾았어요 / 분실 해제</button>' +
      '</div>';
  });

  document.getElementById("result").innerHTML = html;
}
function loadMyFound(email){
  document.getElementById("foundResult").innerHTML =
    '<p style="font-size:16px; color:#666;">내 발견동물 제보를 불러오는 중입니다...</p>';

  var oldScript = document.getElementById("myFoundScript");

  if(oldScript){
    oldScript.remove();
  }

  var script = document.createElement("script");
  script.id = "myFoundScript";

  script.src =
    "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec" +
    "?action=myFound" +
    "&memberEmail=" + encodeURIComponent(email) +
    "&callback=showMyFound";

  document.body.appendChild(script);
}

function showMyFound(data){
  var box = document.getElementById("foundResult");

  if(!data || data.length === 0){
    box.innerHTML =
      '<div class="error-card">' +
      '<h2>등록된 제보 없음</h2>' +
      '<p>현재 로그인 계정으로 등록된 발견동물 제보가 없습니다.</p>' +
      '</div>';
    return;
  }

  var html = "";

  data.reverse().forEach(function(item){
    var status = item.status || "진행중";

    var buttonText =
      status === "종료"
      ? "🔄 다시 제보하기"
      : "🟢 보호자 찾았어요 / 제보 종료";

    var nextStatus =
      status === "종료"
      ? "진행중"
      : "종료";

    var buttonClass =
      status === "종료"
      ? "found-end-btn found-reopen-btn"
      : "found-end-btn";

    html +=
      '<div class="result-card" style="margin-bottom:18px;">' +

      '<h2>' + (item.foundNumber || "발견동물 제보") + '</h2>' +

      '<div class="found-status">상태 : ' + status + '</div>' +

      '<p><strong>동물 종류 :</strong> ' +
      (item.animalType || "-") + '</p>' +

      '<p><strong>발견 장소 :</strong> ' +
      (item.foundPlace || "-") + '</p>' +

      '<p><strong>발견 날짜 :</strong> ' +
      (item.foundDate || "-") + '</p>' +

      '<p><strong>털 색상 :</strong> ' +
      (item.color || "-") + '</p>' +

      '<p><strong>특징 :</strong> ' +
      (item.feature || "-") + '</p>' +

      '<a class="pet-view-btn" href="found_list.html">' +
      '👁 발견동물 제보 목록 보기' +
      '</a>' +

      '<button class="' + buttonClass + '"' +
      ' onclick="changeFoundStatus(\'' +
      item.foundNumber + '\', \'' +
      nextStatus + '\')">' +
      buttonText +
      '</button>' +

      '</div>';
  });

  box.innerHTML = html;
}

function changeFoundStatus(foundNumber, status){
  var email =
    (localStorage.getItem("petnetEmail") || "")
    .trim()
    .toLowerCase();

  var message =
    status === "종료"
    ? foundNumber + " 제보를 종료하시겠습니까?"
    : foundNumber + " 제보를 다시 공개하시겠습니까?";

  if(!confirm(message)){
    return;
  }

  var formData = new FormData();

  formData.append("action", "updateFoundStatus");
  formData.append("foundNumber", foundNumber);
  formData.append("memberEmail", email);
  formData.append("status", status);

  fetch(
    "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec",
    {
      method:"POST",
      body:formData
    }
  )
  .then(function(response){
    return response.text();
  })
  .then(function(result){
    result = result.trim();

    if(result === "found_status_success"){
      alert(
        status === "종료"
        ? "발견동물 제보가 종료되었습니다."
        : "발견동물 제보가 다시 공개되었습니다."
      );

      loadMyFound(email);
      return;
    }

    if(result === "owner_mismatch"){
      alert("본인이 등록한 제보만 변경할 수 있습니다.");
      return;
    }

    alert("처리 중 문제가 발생했습니다.");
  })
  .catch(function(){
    alert("연결 오류가 발생했습니다.");
  });
}

</script>

</body>
</html>
