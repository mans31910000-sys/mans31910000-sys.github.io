<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 반려견 관리</title>
</head>

<body style="text-align:center; font-family:Arial; background-color:#f5f9ff; padding:20px;">

<div style="background:white; padding:25px; border-radius:15px; max-width:420px; margin:auto;">

<h1 style="color:#0066cc;">🐶 내 반려견 관리</h1>

<p>등록한 PET번호와 보호자 연락처를 입력하면<br>내 반려견 정보를 다시 확인할 수 있습니다.</p>

<input id="petId" type="text" placeholder="PET번호 예: PET000001"
style="width:80%; height:45px; font-size:18px;">

<br><br>

<input id="phone" type="text" placeholder="보호자 연락처"
style="width:80%; height:45px; font-size:18px;">

<br><br>

<button onclick="findPet()" style="width:80%; height:55px; font-size:20px; background-color:#0066cc; color:white; border:none; border-radius:10px;">
내 반려견 찾기
</button>

<br><br>

<div id="result"></div>

<br>

<a href="index.html">
<button style="width:80%; height:50px; font-size:18px;">
홈으로 돌아가기
</button>
</a>

</div>

<script>
function findPet() {
  var petId = document.getElementById("petId").value.trim();
  var phone = document.getElementById("phone").value.trim();

  if (petId === "" || phone === "") {
    alert("PET번호와 보호자 연락처를 입력해주세요.");
    return;
  }

  var petPageUrl = "pet.html?id=" + petId;

  var qrImageUrl =
    "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
    encodeURIComponent("https://mans31910000-sys.github.io/petnet/" + petPageUrl);

  document.getElementById("result").innerHTML =
    '<hr>' +
    '<h2 style="color:#ff8800;">' + petId + '</h2>' +
    '<p>등록된 QR을 다시 확인할 수 있습니다.</p>' +
    '<img src="' + qrImageUrl + '" width="220">' +
    '<br><br>' +
    '<a href="' + petPageUrl + '">' +
    '<button style="width:80%; height:50px; font-size:18px; background-color:#66cc66; color:white; border:none; border-radius:10px;">반려견 정보 보기</button>' +
    '</a>';
}
</script>

</body>
</html>
