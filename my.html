<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 반려견 관리</title>
</head>

<body style="text-align:center; font-family:Arial; background-color:#f5f9ff; padding:20px;">

<div style="background:white; padding:25px; border-radius:15px; max-width:420px; margin:auto; box-shadow:0 4px 10px rgba(0,0,0,0.08);">

<h1 style="color:#0066cc;">🐶 내 반려견 관리</h1>

<p>
등록한 PET번호와 보호자 연락처를 입력하면<br>
내 반려견 정보를 확인할 수 있습니다.
</p>

<input id="petId" type="text" placeholder="PET번호 예: PET000001"
style="width:80%; height:45px; font-size:18px;">

<br><br>

<input id="phone" type="tel" placeholder="보호자 연락처 예: 01012345678"
style="width:80%; height:45px; font-size:18px;">

<br><br>

<button onclick="findPet()" style="width:80%; height:55px; font-size:20px; background-color:#0066cc; color:white; border:none; border-radius:10px;">
내 반려견 찾기
</button>

<br><br>

<div id="result"></div>

<br>

<a href="index.html">
<button style="width:80%; height:50px; font-size:18px; border:none; border-radius:10px;">
홈으로 돌아가기
</button>
</a>

</div>

<script>
function findPet() {
  var petId = document.getElementById("petId").value.trim().toUpperCase();
  var phone = document.getElementById("phone").value.trim().replace(/[^0-9]/g, "");

  if (petId === "" || phone === "") {
    alert("PET번호와 보호자 연락처를 입력해주세요.");
    return;
  }

  if (!/^PET[0-9]{6}$/.test(petId)) {
    alert("PET번호 형식이 올바르지 않습니다. 예: PET000001");
    return;
  }

  if (!/^[0-9]{10,11}$/.test(phone)) {
    alert("전화번호는 숫자만 입력하고 10~11자리로 입력해주세요. 예: 01012345678");
    return;
  }

  document.getElementById("result").innerHTML = "<p>조회 중입니다...</p>";

  var oldScript = document.getElementById("petSearchScript");
  if(oldScript){
    oldScript.remove();
  }

  var script = document.createElement("script");
  script.id = "petSearchScript";
  script.src =
    "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec" +
    "?petid=" + encodeURIComponent(petId) +
    "&phone=" + encodeURIComponent(phone) +
    "&callback=showResult";

  document.body.appendChild(script);
}

function showResult(data){
  if(!data.success){
    document.getElementById("result").innerHTML =
      '<hr>' +
      '<h2 style="color:#cc3333;">조회 결과 없음</h2>' +
      '<p style="font-size:16px; line-height:1.6;">' +
      'PET번호 또는 보호자 연락처가 일치하지 않습니다.<br>' +
      '입력 정보를 다시 확인해주세요.' +
      '</p>';
    return;
  }

  document.getElementById("result").innerHTML =
    '<hr>' +
    '<h2 style="color:#0066cc;">' + data.petNumber + '</h2>' +
    '<p><strong>이름 :</strong> ' + data.name + '</p>' +
    '<p><strong>품종 :</strong> ' + data.breed + '</p>' +
    '<p><strong>성별 :</strong> ' + data.gender + '</p>' +
    '<p><strong>특징 :</strong> ' + data.feature + '</p>' +
    '<br>' +
    '<a href="pet.html?id=' + data.petNumber + '">' +
    '<button style="width:80%; height:50px; font-size:18px; background-color:#66cc66; color:white; border:none; border-radius:10px;">반려견 정보 보기</button>' +
    '</a>';
}
</script>

</body>
</html>
