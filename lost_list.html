<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무료 분양 중인 반려견 | PETNET KOREA</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#fff8ef;
  color:#111;
  padding:18px;
}

.wrap{
  max-width:760px;
  margin:0 auto;
}

.header{
  text-align:center;
  background:white;
  border-radius:24px;
  padding:26px 18px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  margin-bottom:18px;
}

.logo{
  width:160px;
  max-width:70%;
  margin-bottom:14px;
}

h1{
  margin:0;
  font-size:32px;
  color:#e67e00;
  font-weight:900;
}

.desc{
  font-size:16px;
  line-height:1.6;
  color:#333;
  margin:14px 0 0;
}

.adoption-card{
  display:block;
  background:white;
  border-radius:22px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:0 8px 22px rgba(0,0,0,0.08);
  border:2px solid #ffd8a8;
  text-decoration:none;
  color:#111;
}

.pet-photo{
  width:100%;
  max-height:330px;
  object-fit:cover;
  border-radius:18px;
  background:#eee;
  margin-bottom:14px;
}

.adoption-badge{
  display:inline-block;
  background:#ff9800;
  color:white;
  font-weight:900;
  padding:8px 12px;
  border-radius:999px;
  margin-bottom:10px;
}

.pet-name{
  font-size:28px;
  font-weight:900;
  color:#e67e00;
  margin:6px 0 12px;
}

.info{
  font-size:17px;
  line-height:1.7;
  color:#222;
}

.detail-guide{
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid #eee;
  color:#0066cc;
  font-size:16px;
  font-weight:900;
}

.home-btn{
  display:block;
  height:52px;
  line-height:52px;
  margin:20px auto 0;
  background:#eee;
  color:#111;
  text-align:center;
  text-decoration:none;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
}

.empty{
  background:white;
  border-radius:22px;
  padding:30px 18px;
  text-align:center;
  color:#555;
  font-size:18px;
  line-height:1.6;
  box-shadow:0 8px 22px rgba(0,0,0,0.08);
}
</style>
</head>

<body>
<div class="wrap">

  <div class="header">
    <img src="petnet-logo-crop.png" class="logo" alt="PETNET KOREA 로고">

    <h1>🏠 무료 분양 중인 반려견</h1>

    <p class="desc">
      새로운 가족을 기다리는 반려견입니다.<br>
      카드를 누르면 자세한 정보와 연락 방법을 확인할 수 있습니다.
    </p>
  </div>

  <div id="adoptionList">
    <div class="empty">무료 분양 정보를 불러오는 중입니다...</div>
  </div>

  <a class="home-btn" href="index.html">🏠 홈으로 돌아가기</a>

</div>

<script>
var script = document.createElement("script");

script.src =
  "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec" +
  "?action=lostPetList&callback=showAdoptionPets";

document.body.appendChild(script);

function escapeHtml(value){
  return String(value == null ? "" : value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function showAdoptionPets(data){
  var box = document.getElementById("adoptionList");

  if(!data || data.length === 0){
    box.innerHTML =
      '<div class="empty">' +
      '현재 무료 분양 중인 반려견이 없습니다.' +
      '</div>';
    return;
  }

  var html = "";

  data.slice().reverse().forEach(function(pet){
    var petNumber = pet.petNumber || "";
    var photo = pet.photo || "petnet-logo-crop.png";

    html +=
      '<a class="adoption-card" href="pet.html?id=' +
      encodeURIComponent(petNumber) +
      '">' +

      '<img class="pet-photo" src="' +
      escapeHtml(photo) +
      '" alt="무료 분양 반려견 사진">' +

      '<div class="adoption-badge">무료 분양 중</div>' +

      '<div class="pet-name">' +
      escapeHtml(pet.name || "이름 미등록") +
      '</div>' +

      '<div class="info">' +
      '<strong>품종 :</strong> ' +
      escapeHtml(pet.breed || "-") +
      '<br>' +

      '<strong>분양 지역 :</strong> ' +
      escapeHtml(pet.adoptionArea || "지역 미입력") +
      '</div>' +

      '<div class="detail-guide">' +
      '자세한 정보와 연락 방법 보기 →' +
      '</div>' +

      '</a>';
  });

  box.innerHTML = html;
}
</script>

</body>
</html>
