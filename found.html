<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입양 희망 신청 | PETNET KOREA</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(0,102,204,0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(76,175,80,0.16), transparent 35%),
        linear-gradient(180deg, #f5f9ff 0%, #eef6f1 100%);
    color:#0d1833;
    text-align:center;
    padding:18px;
    min-height:100vh;
}

.card{
    background:white;
    width:100%;
    max-width:430px;
    margin:42px auto 0;
    padding:30px 22px 34px;
    border-radius:24px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.logo{
    width:170px;
    max-width:70%;
    margin:4px auto 22px;
    display:block;
}

.icon{
    font-size:56px;
    margin-bottom:10px;
}

h1{
    margin:0;
    font-size:30px;
    color:#0066cc;
    font-weight:900;
    line-height:1.3;
}

.desc{
    font-size:17px;
    line-height:1.7;
    margin:22px 0;
    color:#333;
}

.notice{
    background:#f5f9ff;
    border:1px solid #dce8f7;
    border-radius:18px;
    padding:18px 15px;
    margin:22px 0;
    font-size:15px;
    line-height:1.7;
    color:#444;
    text-align:left;
}

.btn{
    display:block;
    width:100%;
    height:56px;
    line-height:56px;
    margin-top:14px;
    font-size:19px;
    font-weight:900;
    text-decoration:none;
    border-radius:16px;
}

.write-btn{
    background:#0066cc;
    color:white;
}

.list-btn{
    background:#fff;
    color:#0066cc;
    border:2px solid #0066cc;
}

.home-btn{
    background:#f0f0f0;
    color:#111;
}

.tip{
    margin-top:18px;
    font-size:13px;
    line-height:1.5;
    color:#777;
}

@media(max-width:480px){
    body{
        padding:14px;
    }

    .card{
        padding:28px 18px 32px;
        border-radius:22px;
    }

    .logo{
        width:155px;
    }

    .icon{
        font-size:52px;
    }

    h1{
        font-size:28px;
    }

    .desc{
        font-size:16px;
    }

    .notice{
        font-size:14px;
    }

    .btn{
        height:54px;
        line-height:54px;
        font-size:18px;
    }
}
</style>
</head>

<body>

<div class="card">

    <img src="petnet-logo-crop.png" class="logo" alt="PETNET KOREA 로고">

    <div class="icon">🐾</div>

    <h1>입양 희망 신청</h1>

    <p class="desc">
        반려견 입양을 희망하시나요?<br>
        희망하는 동물과 지역, 내용을 남기면<br>
        무료 분양 등록자와 연결될 수 있습니다.
    </p>

    <div class="notice">
        ✅ 실제로 입양 가능한 지역을 적어주세요.<br>
        ✅ 희망하는 동물 종류와 조건은 간단히 적어주세요.<br>
        ✅ 연락 방식은 전화, 카카오톡, 비공개 중에서 선택할 수 있습니다.
    </div>

    <a class="btn write-btn" href="found_write.html">
        입양 희망 신청하기
    </a>

    <a class="btn list-btn" href="found_list.html">
        입양 희망 신청 목록
    </a>

    <a class="btn home-btn" href="index.html">
        🏠 홈으로 돌아가기
    </a>

    <div class="tip">
        무료 분양 등록자와 입양 희망자가 지역을 기준으로 서로 연결됩니다.
    </div>

</div>

</body>
</html>
