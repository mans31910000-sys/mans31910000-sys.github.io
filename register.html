<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려견 QR 등록 - 펫넷</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,#ffffff 0%,#f5f9ff 100%);
    color:#0f2340;
    text-align:center;
}

.wrap{
    max-width:620px;
    margin:0 auto;
    padding:35px 20px;
}

.logo{
    width:260px;
    max-width:85%;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:22px;
    padding:30px 22px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
    color:#005bd8;
    font-size:30px;
    margin:10px 0;
}

.desc{
    color:#4d5d73;
    font-size:16px;
    line-height:1.6;
    margin-bottom:25px;
}

.section-title{
    text-align:left;
    font-size:18px;
    font-weight:bold;
    margin:28px 0 12px;
}

input, select, textarea{
    width:100%;
    height:48px;
    font-size:16px;
    padding:0 14px;
    margin:8px 0;
    border:1px solid #d9e3f0;
    border-radius:12px;
    box-sizing:border-box;
}

textarea{
    height:85px;
    padding-top:12px;
    resize:none;
}

.notice{
    background:#f5f9ff;
    border:1px solid #d9e8ff;
    border-radius:14px;
    padding:15px;
    color:#4d5d73;
    font-size:15px;
    line-height:1.6;
    text-align:left;
}

.check-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:12px 0 6px;
    font-size:16px;
    font-weight:bold;
    text-align:left;
}

.check-row input{
    width:20px;
    height:20px;
    margin:0;
}

.help-btn{
    background:none;
    border:none;
    color:#005bd8;
    font-size:15px;
    font-weight:bold;
    margin:8px 0 12px;
    cursor:pointer;
}

.help-box{
    display:none;
    background:#f5f9ff;
    border-radius:14px;
    padding:15px;
    color:#4d5d73;
    font-size:14px;
    line-height:1.7;
    text-align:left;
    margin-bottom:10px;
}

.btn{
    display:block;
    width:100%;
    padding:18px 15px;
    border-radius:14px;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    box-sizing:border-box;
    border:none;
    cursor:pointer;
    margin-top:18px;
}

.primary{
    background:#005bd8;
    color:white;
    box-shadow:0 10px 25px rgba(0,91,216,0.25);
}

.secondary{
    background:white;
    color:#005bd8;
    border:2px solid #005bd8;
}

.small{
    font-size:13px;
    color:#6b7788;
    line-height:1.5;
    margin-top:10px;
}

@media(max-width:700px){
    .logo{ width:230px; }
    h1{ font-size:26px; }
}
</style>
</head>

<body>

<div class="wrap">

    <img src="petnet-logo.png" class="logo" alt="펫넷 로고">

    <div class="card">

        <h1>반려동물 QR 등록</h1>

        <div class="desc">
            반려동물 정보를 입력하면<br>
            보호자와 연결되는 QR 안전태그가 생성됩니다.
        </div>

        <form id="registerForm" action="https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec" method="post">
            <input type="hidden" name="memberEmail" id="memberEmail">

            <div class="section-title">반려동물 정보</div>

            <input name="name" id="petName" type="text" placeholder=" 이름 *" required>

            <input name="breed" id="breed" type="text" placeholder="품종 *" required>

            <select name="gender" id="gender">
                <option value="">성별 선택</option>
                <option value="수컷">수컷</option>
                <option value="암컷">암컷</option>
                <option value="중성화 수컷">중성화 수컷</option>
                <option value="중성화 암컷">중성화 암컷</option>
            </select>

            <textarea name="feature" id="feature" placeholder="특징 예: 겁이 많음, 흰색 털, 빨간 목줄 착용"></textarea>

            <input name="animalRegNo" id="animalRegNo" type="text" placeholder="동물등록번호 공개 시 입력">

            <div class="section-title">반려동물 사진</div>

            <input type="file" id="petPhoto" accept="image/*">
            <input type="hidden" name="photoData" id="photoData">
            <input type="hidden" name="photoName" id="photoName">
            <br><br>

            <img id="preview"
                 style="max-width:100%;
                        max-height:250px;
                        display:none;
                        border-radius:12px;
                        border:1px solid #ddd;">

            <div class="section-title">보호자 연락 방법</div>

            <div class="check-row">
                <input type="checkbox" id="usePhone" checked>
                <label for="usePhone">전화번호로 연락받기</label>
            </div>

            <input name="phone" id="phoneInput" type="tel" inputmode="numeric" placeholder="전화번호 예: 01012345678">

            <div class="check-row">
                <input type="checkbox" id="useKakao">
                <label for="useKakao">카카오톡 오픈채팅으로 연락받기</label>
            </div>

            <input name="kakao" id="kakaoInput" type="url" placeholder="카카오톡 오픈채팅 링크 예: https://open.kakao.com/o/xxxx" disabled>

            <button type="button" class="help-btn" onclick="toggleHelp()">
                ❓ 오픈채팅 링크 만드는 방법 보기
            </button>

            <div id="helpBox" class="help-box">
                1. 카카오톡 실행<br>
                2. 오픈채팅 만들기<br>
                3. 링크 공유 선택<br>
                4. 링크 복사 후 여기에 붙여넣기
            </div>

            <div class="small">
                전화번호와 카카오톡은 둘 다 선택할 수 있습니다.<br>
                단, 최소 하나의 연락 방법은 입력해주세요.
            </div>

            <button type="submit" class="btn primary">
                🐾 QR 생성하기
            </button>

        </form>

        <a href="index.html" class="btn secondary">
            홈으로 돌아가기
        </a>

    </div>

</div>

<script>
const usePhone = document.getElementById("usePhone");
const useKakao = document.getElementById("useKakao");
const phoneInput = document.getElementById("phoneInput");
const kakaoInput = document.getElementById("kakaoInput");

usePhone.addEventListener("change", function(){
    phoneInput.disabled = !this.checked;
    if(!this.checked){
        phoneInput.value = "";
    }
});

useKakao.addEventListener("change", function(){
    kakaoInput.disabled = !this.checked;
    if(!this.checked){
        kakaoInput.value = "";
    }
});

phoneInput.addEventListener("input", function(){
    this.value = this.value.replace(/[^0-9]/g, "");
});

function toggleHelp(){
    const helpBox = document.getElementById("helpBox");
    helpBox.style.display = helpBox.style.display === "block" ? "none" : "block";
}

document.getElementById("registerForm").addEventListener("submit", function(e){
    const petName = document.getElementById("petName").value.trim();
    const breed = document.getElementById("breed").value.trim();
    const phone = phoneInput.value.trim();
    const kakao = kakaoInput.value.trim();

    if(petName === ""){
        alert("반려동물 이름을 입력해주세요.");
        e.preventDefault();
        return;
    }

    if(breed === ""){
        alert("품종을 입력해주세요.");
        e.preventDefault();
        return;
    }

    if(usePhone.checked){
        if(phone === ""){
            alert("전화번호를 입력하거나 전화번호 선택을 해제해주세요.");
            e.preventDefault();
            return;
        }

        if(!/^[0-9]{10,11}$/.test(phone)){
            alert("전화번호는 숫자만 입력하고 10~11자리로 입력해주세요. 예: 01012345678");
            e.preventDefault();
            return;
        }
    }

    if(useKakao.checked){
        if(kakao === ""){
            alert("카카오톡 오픈채팅 링크를 입력하거나 카카오톡 선택을 해제해주세요.");
            e.preventDefault();
            return;
        }

        if(!kakao.startsWith("https://open.kakao.com/")){
            alert("카카오톡 오픈채팅 링크는 https://open.kakao.com/ 로 시작해야 합니다.");
            e.preventDefault();
            return;
        }
    }

    if(!usePhone.checked && !useKakao.checked){
        alert("전화번호 또는 카카오톡 중 하나는 선택해주세요.");
        e.preventDefault();
        return;
    }
});

document.getElementById("petPhoto").addEventListener("change", function(event){
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        const preview = document.getElementById("preview");

        preview.src = e.target.result;
        preview.style.display = "block";
        document.getElementById("photoData").value = e.target.result;
        document.getElementById("photoName").value = file.name;
    };

    reader.readAsDataURL(file);
});
</script>

<script>
document.getElementById("memberEmail").value =
localStorage.getItem("petnetEmail") || "";
</script>

</body>
</html>
