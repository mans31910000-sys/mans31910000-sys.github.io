<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려견 QR 등록 - 펫넷</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,#ffffff 0%,#f5f9ff 100%);
    color:#0f2340;
    text-align:center;
}

.wrap{
    max-width:620px;
    margin:0 auto;
    padding:35px 20px;
}

.logo{
    width:260px;
    max-width:85%;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:22px;
    padding:30px 22px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
    color:#005bd8;
    font-size:30px;
    margin:10px 0;
}

.desc{
    color:#4d5d73;
    font-size:16px;
    line-height:1.6;
    margin-bottom:25px;
}

.section-title{
    text-align:left;
    font-size:18px;
    font-weight:bold;
    margin:28px 0 12px;
    color:#0f2340;
}

input, select, textarea{
    width:100%;
    height:48px;
    font-size:16px;
    padding:0 14px;
    margin:8px 0;
    border:1px solid #d9e3f0;
    border-radius:12px;
    box-sizing:border-box;
}

textarea{
    height:85px;
    padding-top:12px;
    resize:none;
}

.notice{
    background:#f5f9ff;
    border:1px solid #d9e8ff;
    border-radius:14px;
    padding:15px;
    color:#4d5d73;
    font-size:15px;
    line-height:1.6;
    text-align:left;
}

.check-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:12px 0 6px;
    font-size:16px;
    font-weight:bold;
    text-align:left;
}

.check-row input{
    width:20px;
    height:20px;
    margin:0;
}

.help-btn{
    background:none;
    border:none;
    color:#005bd8;
    font-size:15px;
    font-weight:bold;
    margin:8px 0 12px;
    cursor:pointer;
}

.help-box{
    display:none;
    background:#f5f9ff;
    border-radius:14px;
    padding:15px;
    color:#4d5d73;
    font-size:14px;
    line-height:1.7;
    text-align:left;
    margin-bottom:10px;
}

.btn{
    display:block;
    width:100%;
    padding:18px 15px;
    border-radius:14px;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    box-sizing:border-box;
    border:none;
    cursor:pointer;
    margin-top:18px;
}

.primary{
    background:#005bd8;
    color:white;
    box-shadow:0 10px 25px rgba(0,91,216,0.25);
}

.secondary{
    background:white;
    color:#005bd8;
    border:2px solid #005bd8;
}

.small{
    font-size:13px;
    color:#6b7788;
    line-height:1.5;
    margin-top:10px;
}

@media(max-width:700px){
    .logo{
        width:230px;
    }

    h1{
        font-size:26px;
    }
}
</style>
</head>

<body>

<div class="wrap">

    <img src="petnet-logo.png" class="logo" alt="펫넷 로고">

    <div class="card">

        <h1>반려견 QR 등록</h1>

        <div class="desc">
            반려견 정보를 입력하면<br>
            보호자와 연결되는 QR 신분증이 생성됩니다.
        </div>

        <form action="https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec" method="post">

            <div class="section-title">반려견 정보</div>

            <input name="name" type="text" placeholder="반려견 이름 *" required>

            <input name="breed" type="text" placeholder="품종">

            <select name="gender">
                <option value="">성별 선택</option>
                <option value="수컷">수컷</option>
                <option value="암컷">암컷</option>
                <option value="중성화 수컷">중성화 수컷</option>
                <option value="중성화 암컷">중성화 암컷</option>
            </select>

            <textarea name="feature" placeholder="특징 예: 겁이 많음, 흰색 털, 빨간 목줄 착용"></textarea>

            <div class="section-title">반려견 사진</div>

            <div class="notice">
                📷 사진 등록 기능은 준비중입니다.<br>
                곧 휴대폰에서 사진을 바로 업로드할 수 있도록 추가할 예정입니다.
            </div>

            <div class="section-title">보호자 연락 방법</div>

            <div class="check-row">
                <input type="checkbox" id="usePhone" checked>
                <label for="usePhone">전화번호로 연락받기</label>
            </div>

            <input name="phone" id="phoneInput" type="tel" inputmode="tel" placeholder="전화번호 예: 01012345678">

            <div class="check-row">
                <input type="checkbox" id="useKakao">
                <label for="useKakao">카카오톡 오픈채팅으로 연락받기</label>
            </div>

            <input name="kakao" id="kakaoInput" type="url" placeholder="카카오톡 오픈채팅 링크 예: https://open.kakao.com/o/xxxx" disabled>

            <button type="button" class="help-btn" onclick="toggleHelp()">
                ❓ 오픈채팅 링크 만드는 방법 보기
            </button>

            <div id="helpBox" class="help-box">
                1. 카카오톡 실행<br>
                2. 오픈채팅 만들기<br>
                3. 링크 공유 선택<br>
                4. 링크 복사 후 여기에 붙여넣기
            </div>

            <div class="small">
                전화번호와 카카오톡은 둘 다 선택할 수 있습니다.<br>
                단, 최소 하나의 연락 방법은 입력해주세요.
            </div>

            <button type="submit" class="btn primary">
                🐾 QR 생성하기
            </button>

        </form>

        <a href="index.html" class="btn secondary">
            홈으로 돌아가기
        </a>

    </div>

</div>

<script>
const usePhone = document.getElementById("usePhone");
const useKakao = document.getElementById("useKakao");
const phoneInput = document.getElementById("phoneInput");
const kakaoInput = document.getElementById("kakaoInput");

usePhone.addEventListener("change", function(){
    phoneInput.disabled = !this.checked;
    if(!this.checked){
        phoneInput.value = "";
    }
});

useKakao.addEventListener("change", function(){
    kakaoInput.disabled = !this.checked;
    if(!this.checked){
        kakaoInput.value = "";
    }
});

function toggleHelp(){
    const helpBox = document.getElementById("helpBox");
    helpBox.style.display = helpBox.style.display === "block" ? "none" : "block";
}

document.querySelector("form").addEventListener("submit", function(e){
    if(usePhone.checked && phoneInput.value.trim() === ""){
        alert("전화번호를 입력하거나 전화번호 선택을 해제해주세요.");
        e.preventDefault();
        return;
    }

    if(useKakao.checked && kakaoInput.value.trim() === ""){
        alert("카카오톡 오픈채팅 링크를 입력하거나 카카오톡 선택을 해제해주세요.");
        e.preventDefault();
        return;
    }

    if(!usePhone.checked && !useKakao.checked){
        alert("전화번호 또는 카카오톡 중 하나는 선택해주세요.");
        e.preventDefault();
        return;
    }
});
</script>

</body>
</html>
