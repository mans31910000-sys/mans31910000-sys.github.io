<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>후기 목록 보기 | PETNET KOREA</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(0,102,204,0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(76,175,80,0.16), transparent 35%),
        linear-gradient(180deg, #f5f9ff 0%, #eef6f1 100%);
    color:#111;
    padding:16px;
    min-height:100vh;
}

.wrap{
    width:100%;
    max-width:760px;
    margin:0 auto;
}

.header{
    background:white;
    border-radius:24px;
    padding:26px 18px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    margin:28px 0 18px;
}

.logo{
    width:155px;
    max-width:70%;
    margin:0 auto 16px;
    display:block;
}

h1{
    margin:0;
    font-size:28px;
    color:#0066cc;
    font-weight:900;
    line-height:1.3;
}

.sub{
    margin:12px 0 0;
    font-size:15px;
    line-height:1.6;
    color:#555;
}

.list{
    margin-top:18px;
}

.review-card{
    background:white;
    border-radius:22px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    overflow:hidden;
}

.photo-box{
    width:100%;
    height:170px;
    border-radius:18px;
    background:#eef3f8;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#999;
    font-size:18px;
    font-weight:900;
    margin-bottom:16px;
    overflow:hidden;
}

.photo-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:18px;
}

.review-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:10px;
}

.review-type{
    display:inline-block;
    background:#eaf3ff;
    color:#0066cc;
    border-radius:999px;
    padding:7px 12px;
    font-size:13px;
    font-weight:900;
    margin-bottom:8px;
}

.date{
    font-size:13px;
    color:#777;
    white-space:nowrap;
    padding-top:6px;
}

.title{
    font-size:22px;
    font-weight:900;
    color:#111;
    line-height:1.35;
    margin-bottom:8px;
}

.writer{
    font-size:14px;
    color:#666;
    font-weight:800;
    margin-bottom:12px;
}

.content{
    font-size:16px;
    line-height:1.7;
    color:#333;
    white-space:pre-line;
    margin-bottom:18px;
}

.comment-section{
    border-top:1px solid #e5eaf1;
    padding-top:14px;
    margin-top:12px;
}

.comment-title{
    font-size:17px;
    font-weight:900;
    margin-bottom:10px;
    color:#111;
}

.comment-form{
    background:#f7faff;
    border:1px solid #dce8f7;
    border-radius:16px;
    padding:12px;
    margin-bottom:14px;
}

.comment-form input,
.comment-form textarea{
    width:100%;
    border:1px solid #d4deea;
    border-radius:12px;
    padding:11px;
    font-size:14px;
    margin-bottom:8px;
    font-family:Arial, sans-serif;
}

.comment-form textarea{
    min-height:70px;
    resize:none;
}

.comment-btn{
    width:100%;
    border:0;
    border-radius:12px;
    background:#0066cc;
    color:white;
    font-size:15px;
    font-weight:900;
    padding:12px;
    cursor:pointer;
}

.comment-item{
    background:#f7f7f7;
    border-radius:14px;
    padding:12px;
    margin-bottom:10px;
}

.reply-item{
    background:#eef6ff;
    border-left:4px solid #0066cc;
    margin-left:18px;
}

.comment-meta{
    display:flex;
    justify-content:space-between;
    gap:10px;
    font-size:13px;
    color:#666;
    margin-bottom:6px;
}

.comment-name{
    font-weight:900;
    color:#111;
}

.comment-text{
    font-size:14px;
    line-height:1.5;
    color:#333;
    white-space:pre-line;
}

.reply-btn{
    margin-top:8px;
    border:0;
    background:transparent;
    color:#0066cc;
    font-weight:900;
    font-size:13px;
    cursor:pointer;
    padding:0;
}

.reply-form{
    display:none;
    margin-top:10px;
    background:white;
    border:1px solid #dce8f7;
    border-radius:14px;
    padding:10px;
}

.reply-form input,
.reply-form textarea{
    width:100%;
    border:1px solid #d4deea;
    border-radius:10px;
    padding:10px;
    font-size:13px;
    margin-bottom:7px;
    font-family:Arial, sans-serif;
}

.reply-form textarea{
    min-height:60px;
    resize:none;
}

.empty-comment{
    color:#888;
    font-size:14px;
    padding:10px 0;
}

.empty,
.loading{
    background:white;
    border-radius:20px;
    padding:28px 18px;
    text-align:center;
    color:#777;
    font-size:17px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.btns{
    display:flex;
    gap:10px;
    margin:20px 0 30px;
}

.btn{
    flex:1;
    height:52px;
    line-height:52px;
    text-align:center;
    border-radius:16px;
    text-decoration:none;
    font-size:17px;
    font-weight:900;
}

.write-btn{
    background:#0066cc;
    color:white;
}

.home-btn{
    background:white;
    color:#111;
    border:2px solid #ddd;
}

@media(max-width:480px){
    body{
        padding:14px;
    }

    .header{
        margin-top:18px;
        padding:24px 16px;
    }

    h1{
        font-size:25px;
    }

    .photo-box{
        height:150px;
        font-size:16px;
    }

    .title{
        font-size:20px;
    }

    .content{
        font-size:15px;
    }

    .btn{
        font-size:15px;
    }
}
</style>
</head>

<body>

<div class="wrap">

    <div class="header">
        <img src="petnet-logo-crop.png" class="logo" alt="PETNET KOREA 로고">

        <h1>후기 목록</h1>

        <p class="sub">
            펫넷 사용 후기와 보호자 연결 사례를 확인할 수 있습니다.<br>
            댓글과 답글을 남길 수 있습니다.
        </p>
    </div>

    <div id="list" class="list">
        <div class="loading">후기 목록을 불러오는 중...</div>
    </div>

    <div class="btns">
        <a class="btn write-btn" href="review_write.html">후기 작성</a>
        <a class="btn home-btn" href="reviews.html">이전으로</a>
    </div>

</div>

<script>
var API_URL = "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec";
var allComments = [];

function escapeHtml(text){
    return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function makePhotoBox(photoUrl){
    if(!photoUrl || photoUrl.trim() === ""){
        return '<div class="photo-box">사진 없음</div>';
    }

    var url = photoUrl.trim();

    if(url.indexOf("drive.google.com/uc?export=view&id=") !== -1){
        var id = url.split("id=")[1];
        url = "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000";
    }

    return '<div class="photo-box"><img src="' + url + '" alt="후기 사진"></div>';
}

function getCommentsByTitle(reviewTitle){
    return allComments.filter(function(comment){
        return comment.reviewTitle === reviewTitle && comment.commentType === "comment";
    });
}

function getReplies(parentCommentNumber){
    return allComments.filter(function(comment){
        return comment.commentType === "reply" && comment.parentCommentNumber === parentCommentNumber;
    });
}

function makeCommentHtml(comment, reviewTitle){
    var replies = getReplies(comment.commentNumber);
    var html = "";

    html += '<div class="comment-item">';
    html += '<div class="comment-meta">';
    html += '<span class="comment-name">' + escapeHtml(comment.writerName || "익명") + '</span>';
    html += '<span>' + escapeHtml(comment.commentDate || "") + '</span>';
    html += '</div>';
    html += '<div class="comment-text">' + escapeHtml(comment.commentText || "") + '</div>';

    html += '<button class="reply-btn" onclick="toggleReplyForm(\'' + escapeHtml(comment.commentNumber) + '\')">답글 달기</button>';

    html += '<div id="replyForm_' + escapeHtml(comment.commentNumber) + '" class="reply-form">';
    html += '<input type="text" id="replyName_' + escapeHtml(comment.commentNumber) + '" placeholder="이름 또는 별명">';
    html += '<textarea id="replyText_' + escapeHtml(comment.commentNumber) + '" placeholder="답글을 입력해주세요"></textarea>';
    html += '<button class="comment-btn" onclick="submitReply(\'' + escapeHtml(reviewTitle) + '\', \'' + escapeHtml(comment.commentNumber) + '\')">답글 등록</button>';
    html += '</div>';

    replies.forEach(function(reply){
        html += '<div class="comment-item reply-item">';
        html += '<div class="comment-meta">';
        html += '<span class="comment-name">↳ ' + escapeHtml(reply.writerName || "익명") + '</span>';
        html += '<span>' + escapeHtml(reply.commentDate || "") + '</span>';
        html += '</div>';
        html += '<div class="comment-text">' + escapeHtml(reply.commentText || "") + '</div>';
        html += '</div>';
    });

    html += '</div>';

    return html;
}

function makeCommentSection(reviewTitle){
    var comments = getCommentsByTitle(reviewTitle);
    var safeTitle = escapeHtml(reviewTitle);

    var html = "";
    html += '<div class="comment-section">';
    html += '<div class="comment-title">댓글</div>';

    html += '<div class="comment-form">';
    html += '<input type="text" id="commentName_' + safeTitle + '" placeholder="이름 또는 별명">';
    html += '<textarea id="commentText_' + safeTitle + '" placeholder="댓글을 입력해주세요"></textarea>';
    html += '<button class="comment-btn" onclick="submitComment(\'' + safeTitle + '\')">댓글 등록</button>';
    html += '</div>';

    if(comments.length === 0){
        html += '<div class="empty-comment">아직 댓글이 없습니다.</div>';
    }else{
        comments.forEach(function(comment){
            html += makeCommentHtml(comment, reviewTitle);
        });
    }

    html += '</div>';

    return html;
}

function submitHiddenForm(data){
    var iframe = document.createElement("iframe");
    iframe.name = "hiddenCommentFrame_" + new Date().getTime();
    iframe.style.display = "none";
    document.body.appendChild(iframe);

    var form = document.createElement("form");
    form.method = "POST";
    form.action = API_URL;
    form.target = iframe.name;
    form.style.display = "none";

    Object.keys(data).forEach(function(key){
        var input = document.createElement("input");
        input.type = "hidden";
        input.name = key;
        input.value = data[key];
        form.appendChild(input);
    });

    document.body.appendChild(form);
    form.submit();

    setTimeout(function(){
        location.reload();
    }, 1800);
}

function submitComment(reviewTitle){
    var nameInput = document.getElementById("commentName_" + reviewTitle);
    var textInput = document.getElementById("commentText_" + reviewTitle);

    var writerName = nameInput.value.trim();
    var commentText = textInput.value.trim();

    if(writerName === "" || commentText === ""){
        alert("이름과 댓글 내용을 입력해주세요.");
        return;
    }

    submitHiddenForm({
        action: "reviewComment",
        reviewTitle: reviewTitle,
        commentType: "comment",
        writerName: writerName,
        commentText: commentText,
        parentCommentNumber: ""
    });
}

function toggleReplyForm(commentNumber){
    var box = document.getElementById("replyForm_" + commentNumber);

    if(!box){
        return;
    }

    if(box.style.display === "block"){
        box.style.display = "none";
    }else{
        box.style.display = "block";
    }
}

function submitReply(reviewTitle, parentCommentNumber){
    var nameInput = document.getElementById("replyName_" + parentCommentNumber);
    var textInput = document.getElementById("replyText_" + parentCommentNumber);

    var writerName = nameInput.value.trim();
    var commentText = textInput.value.trim();

    if(writerName === "" || commentText === ""){
        alert("이름과 답글 내용을 입력해주세요.");
        return;
    }

    submitHiddenForm({
        action: "reviewComment",
        reviewTitle: reviewTitle,
        commentType: "reply",
        writerName: writerName,
        commentText: commentText,
        parentCommentNumber: parentCommentNumber
    });
}

function loadReviewList(){
    Promise.all([
        fetch(API_URL + "?action=reviewList").then(function(response){ return response.json(); }),
        fetch(API_URL + "?action=reviewComments").then(function(response){ return response.json(); })
    ])
    .then(function(results){
        var reviews = results[0];
        allComments = results[1] || [];

        var list = document.getElementById("list");
        list.innerHTML = "";

        if(!reviews || reviews.length === 0){
            list.innerHTML =
                '<div class="empty">아직 공개된 후기가 없습니다.<br>관리자 승인 후 후기가 표시됩니다.</div>';
            return;
        }

        reviews.reverse().forEach(function(item){
            var card = document.createElement("div");
            card.className = "review-card";

            var reviewTitle = item.title || "제목 없음";

            card.innerHTML =
                makePhotoBox(item.photoUrl || "") +
                '<div class="review-top">' +
                    '<div>' +
                        '<div class="review-type">' + escapeHtml(item.reviewType || "후기") + '</div>' +
                        '<div class="title">' + escapeHtml(reviewTitle) + '</div>' +
                    '</div>' +
                    '<div class="date">' + escapeHtml(item.reviewDate || "") + '</div>' +
                '</div>' +
                '<div class="writer">작성자: ' + escapeHtml(item.writerName || "익명") + '</div>' +
                '<div class="content">' + escapeHtml(item.content || "") + '</div>' +
                makeCommentSection(reviewTitle);

            list.appendChild(card);
        });
    })
    .catch(function(){
        document.getElementById("list").innerHTML =
            '<div class="empty">후기 목록을 불러오지 못했습니다.</div>';
    });
}

loadReviewList();
</script>

</body>
</html>
