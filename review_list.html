<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>후기 목록 보기 | PETNET KOREA</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(0,102,204,0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(76,175,80,0.16), transparent 35%),
        linear-gradient(180deg, #f5f9ff 0%, #eef6f1 100%);
    color:#111;
    padding:16px;
    min-height:100vh;
}

.wrap{
    width:100%;
    max-width:760px;
    margin:0 auto;
}

.header{
    background:white;
    border-radius:24px;
    padding:26px 18px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    margin:28px 0 18px;
}

.logo{
    width:155px;
    max-width:70%;
    margin:0 auto 16px;
    display:block;
}

h1{
    margin:0;
    font-size:28px;
    color:#0066cc;
    font-weight:900;
    line-height:1.3;
}

.sub{
    margin:12px 0 0;
    font-size:15px;
    line-height:1.6;
    color:#555;
}

.list{
    margin-top:18px;
}

.review-card{
    background:white;
    border-radius:22px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    overflow:hidden;
}

.photo-box{
    width:100%;
    height:170px;
    border-radius:18px;
    background:#eef3f8;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#999;
    font-size:18px;
    font-weight:900;
    margin-bottom:16px;
    overflow:hidden;
}

.photo-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:18px;
}

.review-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:10px;
}

.review-type{
    display:inline-block;
    background:#eaf3ff;
    color:#0066cc;
    border-radius:999px;
    padding:7px 12px;
    font-size:13px;
    font-weight:900;
    margin-bottom:8px;
}

.date{
    font-size:13px;
    color:#777;
    white-space:nowrap;
    padding-top:6px;
}

.title{
    font-size:22px;
    font-weight:900;
    color:#111;
    line-height:1.35;
    margin-bottom:8px;
}

.writer{
    font-size:14px;
    color:#666;
    font-weight:800;
    margin-bottom:12px;
}

.content{
    font-size:16px;
    line-height:1.7;
    color:#333;
    white-space:pre-line;
}

.empty,
.loading{
    background:white;
    border-radius:20px;
    padding:28px 18px;
    text-align:center;
    color:#777;
    font-size:17px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.btns{
    display:flex;
    gap:10px;
    margin:20px 0 30px;
}

.btn{
    flex:1;
    height:52px;
    line-height:52px;
    text-align:center;
    border-radius:16px;
    text-decoration:none;
    font-size:17px;
    font-weight:900;
}

.write-btn{
    background:#0066cc;
    color:white;
}

.home-btn{
    background:white;
    color:#111;
    border:2px solid #ddd;
}

@media(max-width:480px){
    body{
        padding:14px;
    }

    .header{
        margin-top:18px;
        padding:24px 16px;
    }

    h1{
        font-size:25px;
    }

    .photo-box{
        height:150px;
        font-size:16px;
    }

    .title{
        font-size:20px;
    }

    .content{
        font-size:15px;
    }

    .btn{
        font-size:15px;
    }
}
</style>
</head>

<body>

<div class="wrap">

    <div class="header">
        <img src="petnet-logo-crop.png" class="logo" alt="PETNET KOREA 로고">

        <h1>후기 목록</h1>

        <p class="sub">
            펫넷 사용 후기와 보호자 연결 사례를 확인할 수 있습니다.<br>
            승인된 후기만 공개됩니다.
        </p>
    </div>

    <div id="list" class="list">
        <div class="loading">후기 목록을 불러오는 중...</div>
    </div>

    <div class="btns">
        <a class="btn write-btn" href="review_write.html">후기 작성</a>
        <a class="btn home-btn" href="reviews.html">이전으로</a>
    </div>

</div>

<script>
var API_URL = "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec";

function makePhotoBox(photoUrl){
    if(!photoUrl || photoUrl.trim() === ""){
        return '<div class="photo-box">사진 없음</div>';
    }

    var url = photoUrl.trim();

    if(url.indexOf("drive.google.com/uc?export=view&id=") !== -1){
        var id = url.split("id=")[1];
        url = "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000";
    }

    return '<div class="photo-box"><img src="' + url + '" alt="후기 사진"></div>';
}

function loadReviewList(){
    fetch(API_URL + "?action=reviewList")
    .then(function(response){
        return response.json();
    })
    .then(function(data){
        var list = document.getElementById("list");
        list.innerHTML = "";

        if(!data || data.length === 0){
            list.innerHTML =
                '<div class="empty">아직 공개된 후기가 없습니다.<br>관리자 승인 후 후기가 표시됩니다.</div>';
            return;
        }

        data.reverse().forEach(function(item){
            var card = document.createElement("div");
            card.className = "review-card";

            card.innerHTML =
                makePhotoBox(item.photoUrl || "") +
                '<div class="review-top">' +
                    '<div>' +
                        '<div class="review-type">' + (item.reviewType || "후기") + '</div>' +
                        '<div class="title">' + (item.title || "제목 없음") + '</div>' +
                    '</div>' +
                    '<div class="date">' + (item.reviewDate || "") + '</div>' +
                '</div>' +
                '<div class="writer">작성자: ' + (item.writerName || "익명") + '</div>' +
                '<div class="content">' + (item.content || "") + '</div>';

            list.appendChild(card);
        });
    })
    .catch(function(){
        document.getElementById("list").innerHTML =
            '<div class="empty">후기 목록을 불러오지 못했습니다.</div>';
    });
}

loadReviewList();
</script>

</body>
</html>
