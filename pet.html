<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려견 보호자 연결 - 펫넷</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,#ffffff 0%,#f5f9ff 100%);
    color:#0f2340;
    text-align:center;
}

.wrap{
    max-width:560px;
    margin:0 auto;
    padding:35px 20px;
}

.logo{
    width:250px;
    max-width:85%;
    margin-bottom:12px;
}

.lang-box{
    margin:5px 0 18px;
}

.lang-box button{
    border:1px solid #d9e8ff;
    background:white;
    color:#005bd8;
    border-radius:20px;
    padding:8px 10px;
    margin:3px;
    font-weight:bold;
    cursor:pointer;
}

.card{
    background:white;
    border-radius:22px;
    padding:30px 22px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
    color:#005bd8;
    font-size:28px;
    margin:10px 0;
}

.desc{
    font-size:17px;
    color:#4d5d73;
    line-height:1.6;
    margin-bottom:25px;
}

.pet-info{
    background:#f5f9ff;
    border:1px solid #d9e8ff;
    border-radius:18px;
    padding:20px;
    text-align:left;
    margin:20px 0;
}

.pet-info p{
    font-size:17px;
    line-height:1.6;
    margin:10px 0;
}

.btn{
    display:block;
    width:100%;
    padding:18px 15px;
    border-radius:14px;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    box-sizing:border-box;
    border:none;
    cursor:pointer;
    margin:12px 0;
}

.phone{ background:#16a34a; color:white; }
.kakao{ background:#fee500; color:#111; }
.share{ background:white; color:#005bd8; border:2px solid #005bd8; }
.home{ background:#005bd8; color:white; }

.notice{
    margin-top:22px;
    color:#4d5d73;
    font-size:14px;
    line-height:1.6;
}

.loading{
    color:#4d5d73;
    font-size:17px;
}

@media(max-width:700px){
    .logo{ width:230px; }
    h1{ font-size:25px; }
    .btn{ font-size:18px; }
}
</style>
</head>

<body>

<div class="wrap">

    <img src="petnet-logo.png" class="logo" alt="펫넷 로고">

    <div class="lang-box">
        <button type="button" onclick="setLang('ko')">🇰🇷 한국어</button>
        <button type="button" onclick="setLang('en')">🇺🇸 English</button>
        <button type="button" onclick="setLang('zh')">🇨🇳 中文</button>
        <button type="button" onclick="setLang('ja')">🇯🇵 日本語</button>
    </div>

    <div class="card">

        <h1 id="title">이 반려견을 발견하셨나요?</h1>

        <div id="desc" class="desc">
            아래 정보를 확인한 뒤<br>
            보호자에게 바로 연락해주세요.
        </div>

        <div id="loading" class="loading">
            반려견 정보를 불러오는 중...
        </div>

        <div id="content" style="display:none;">

            <div class="pet-info">
                <img id="petPhoto"
                     alt="반려견 사진"
                     style="width:100%;
                            max-height:300px;
                            object-fit:cover;
                            border-radius:15px;
                            margin-bottom:15px;
                            display:none;">

                <p id="name"></p>
                <p id="breed"></p>
                <p id="gender"></p>
                <p id="feature"></p>
                <p id="adoptionArea" style="display:none;"></p>
                <p id="animalRegNo" style="display:none;"></p>
            </div>

            <a id="phoneLink"
               class="btn phone"
               href="#"
               style="display:none;">
                📞 보호자 전화하기
            </a>

            <a id="kakaoLink"
               class="btn kakao"
               href="#"
               target="_blank"
               rel="noopener"
               style="display:none;">
                💬 카카오톡 연락하기
            </a>

            <button id="shareBtn"
                    type="button"
                    class="btn share"
                    onclick="copyPageLink()">
                📤 카카오톡 공유하기
            </button>

            <a id="homeBtn"
               href="https://mans31910000-sys.github.io/"
               class="btn home">
                🏠 펫넷 바로가기
            </a>

            <div id="notice" class="notice">
                🔒 펫넷은 개인정보 노출을 줄이고<br>
                발견자와 보호자를 빠르게 연결합니다.
            </div>

        </div>

    </div>

</div>

var petId = String(params.get("id") || "").trim();
var isAdoptionMode = params.get("mode") === "adoption";

var petData = null;
var currentLang = "ko";
var loadFailed = false;

var text = {

      phone:"📞 입양 문의 전화하기",

    animalRegNo:"National animal registration number",
    noInfo:"No information",

    copied:"The pet page address has been copied.",
    copyFail:
      "Please copy and share the address from the browser bar.",

    qr:{
      pageTitle:"Contact the Pet Owner - PetNet",
      title:"Have you found this pet?",

      desc:
        "Please check the information below<br>" +

      share:"📤 Share via KakaoTalk",

    },

      title:"This pet is available for free adoption",

      notice:

      notice:

    },

      desc:

    notFound:"登録情報が見つかりません。",
    adoptionNotFound:

    name:"名前",

      desc:

        "飼い主へ譲渡についてお問い合わせください。",

      phone:"📞 譲渡について電話する",
      kakao:"💬 KakaoTalkで譲渡を問い合わせる",
      share:"📤 無料譲渡情報を共有する",
      home:"🏠 無料譲渡一覧へ戻る",

      notice:
        "🐶 譲渡可能かどうかと詳しい条件は、<br>" +
        "飼い主へ直接ご確認ください。"
    }
  }
};

function escapeHtml(value){
  return String(value == null ? "" : value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getCurrentText(){
  return text[currentLang] || text.ko;
}

function getModeText(){
  var t = getCurrentText();

  return isAdoptionMode
    ? t.adoption
    : t.qr;
}

function applyModeText(){
  var t = getCurrentText();
  var modeText = getModeText();

  document.documentElement.lang = currentLang;
  document.title = modeText.pageTitle;

  document.getElementById("title").innerHTML =
    modeText.title;

  document.getElementById("desc").innerHTML =
    modeText.desc;

  document.getElementById("loading").innerText =
    loadFailed
      ? (
          isAdoptionMode
            ? t.adoptionNotFound
            : t.notFound
        )
      : t.loading;

  document.getElementById("phoneLink").innerHTML =
    modeText.phone;

  document.getElementById("kakaoLink").innerHTML =
    modeText.kakao;

  document.getElementById("shareBtn").innerHTML =
    modeText.share;

  document.getElementById("homeBtn").innerHTML =
    modeText.home;

  document.getElementById("homeBtn").href =
    isAdoptionMode
      ? "lost_list.html"
      : "https://mans31910000-sys.github.io/";

  document.getElementById("notice").innerHTML =
    modeText.notice;
}

function setLang(lang){
  currentLang = text[lang]
    ? lang
    : "ko";

  applyModeText();

  if(petData){
    renderPetInfo();
  }
}

function renderPetInfo(){
  var t = getCurrentText();

  document.getElementById("name").innerHTML =
    "<b>" +
    escapeHtml(t.name) +
    ":</b> " +
    escapeHtml(petData.name || t.noInfo);

  document.getElementById("breed").innerHTML =
    "<b>" +
    escapeHtml(t.breed) +
    ":</b> " +
    escapeHtml(petData.breed || t.noInfo);

  document.getElementById("gender").innerHTML =
    "<b>" +
    escapeHtml(t.gender) +
    ":</b> " +
    escapeHtml(petData.gender || t.noInfo);

  document.getElementById("feature").innerHTML =
    "<b>" +
    escapeHtml(t.feature) +
    ":</b> " +
    escapeHtml(petData.feature || t.noInfo);

  var adoptionAreaElement =
    document.getElementById("adoptionArea");

  if(isAdoptionMode){
    adoptionAreaElement.innerHTML =
      "<b>" +
      escapeHtml(t.adoptionArea) +
      ":</b> " +
      escapeHtml(
        petData.adoptionArea || t.noInfo
      );

    adoptionAreaElement.style.display =
      "block";
  }else{
    adoptionAreaElement.style.display =
      "none";
  }

  var regNo =
    petData.animalRegNo ||
    petData.animalregno ||
    petData.animal_reg_no ||
    petData.regNo ||
    "";

  if(String(regNo).trim() !== ""){
    document.getElementById("animalRegNo").innerHTML =
      "<b>" +
      escapeHtml(t.animalRegNo) +
      ":</b> " +
      escapeHtml(regNo);

    document.getElementById("animalRegNo").style.display =
      "block";
  }else{
    document.getElementById("animalRegNo").style.display =
      "none";
  }
}

function showNotFound(){
  loadFailed = true;

  var t = getCurrentText();

  document.getElementById("loading").innerText =
    isAdoptionMode
      ? t.adoptionNotFound
      : t.notFound;

  document.getElementById("content").style.display =
    "none";
}

function isSafeWebUrl(value){
  try{
    var url = new URL(
      String(value || ""),
      window.location.href
    );

    return (
      url.protocol === "https:" ||
      url.protocol === "http:"
    );
  }catch(error){
    return false;
  }
}

function showPet(data){
  if(!data || data.error){
    showNotFound();
    return;
  }

  loadFailed = false;
  petData = data;

  document.getElementById("loading").style.display =
    "none";

  document.getElementById("content").style.display =
    "block";

  renderPetInfo();

  var photo =
    data.photoUrl ||
    data.photo ||
    data.image ||
    "";

  var photoElement =
    document.getElementById("petPhoto");

  if(isSafeWebUrl(photo)){
    photoElement.src = photo;
    photoElement.style.display = "block";
  }else{
    photoElement.removeAttribute("src");
    photoElement.style.display = "none";
  }

  var phone =
    String(data.phone || "")
      .replace(/[^0-9+]/g, "");

  var phoneLink =
    document.getElementById("phoneLink");

  if(phone !== ""){
    phoneLink.href = "tel:" + phone;
    phoneLink.style.display = "block";
  }else{
    phoneLink.style.display = "none";
  }

  var kakaoLink =
    document.getElementById("kakaoLink");

  if(isSafeWebUrl(data.kakao)){
    kakaoLink.href = data.kakao;
    kakaoLink.style.display = "block";
  }else{
    kakaoLink.removeAttribute("href");
    kakaoLink.style.display = "none";
  }
}

function showAdoptionPetList(data){
  if(!Array.isArray(data)){
    showNotFound();
    return;
  }

  var matchedPet = null;

  for(var i = 0; i < data.length; i++){
    if(
      String(data[i].petNumber || "").trim()
      === petId
    ){
      matchedPet = data[i];
      break;
    }
  }

  if(!matchedPet){
    showNotFound();
    return;
  }

  showPet(matchedPet);
}

function copyPageLink(){
  var t = getCurrentText();
  var pageUrl = window.location.href;

  if(
    navigator.clipboard &&
    window.isSecureContext
  ){
    navigator.clipboard
      .writeText(pageUrl)
      .then(function(){
        alert(t.copied);
      })
      .catch(function(){
        prompt(t.copyFail, pageUrl);
      });
  }else{
    prompt(t.copyFail, pageUrl);
  }
}

applyModeText();

if(petId === ""){
  showNotFound();
}else{
  var apiScript =
    document.createElement("script");

  if(isAdoptionMode){
    apiScript.src =
      API_URL +
      "?action=lostPetList" +
      "&callback=showAdoptionPetList";
  }else{
    apiScript.src =
      API_URL +
      "?id=" +
      encodeURIComponent(petId) +
      "&callback=showPet";
  }

  apiScript.onerror = showNotFound;

  document.body.appendChild(apiScript);
}
</script>

</body>
</html>
