<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려견 보호자 연결 - 펫넷</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,#ffffff 0%,#f5f9ff 100%);
    color:#0f2340;
    text-align:center;
}

.wrap{
    max-width:560px;
    margin:0 auto;
    padding:35px 20px;
}

.logo{
    width:250px;
    max-width:85%;
    margin-bottom:12px;
}

.lang-box{
    margin:5px 0 18px;
}

.lang-box button{
    border:1px solid #d9e8ff;
    background:white;
    color:#005bd8;
    border-radius:20px;
    padding:8px 10px;
    margin:3px;
    font-weight:bold;
    cursor:pointer;
}

.card{
    background:white;
    border-radius:22px;
    padding:30px 22px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
    color:#005bd8;
    font-size:28px;
    margin:10px 0;
}

.desc{
    font-size:17px;
    color:#4d5d73;
    line-height:1.6;
    margin-bottom:25px;
}

.pet-info{
    background:#f5f9ff;
    border:1px solid #d9e8ff;
    border-radius:18px;
    padding:20px;
    text-align:left;
    margin:20px 0;
}

.pet-info p{
    font-size:17px;
    line-height:1.6;
    margin:10px 0;
}

.btn{
    display:block;
    width:100%;
    padding:18px 15px;
    border-radius:14px;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    box-sizing:border-box;
    border:none;
    cursor:pointer;
    margin:12px 0;
}

.phone{ background:#16a34a; color:white; }
.kakao{ background:#fee500; color:#111; }
.share{ background:white; color:#005bd8; border:2px solid #005bd8; }
.home{ background:#005bd8; color:white; }

.notice{
    margin-top:22px;
    color:#4d5d73;
    font-size:14px;
    line-height:1.6;
}

.loading{
    color:#4d5d73;
    font-size:17px;
}

@media(max-width:700px){
    .logo{ width:230px; }
    h1{ font-size:25px; }
    .btn{ font-size:18px; }
}
</style>
</head>

<body>

<div class="wrap">

    <img src="petnet-logo.png" class="logo" alt="펫넷 로고">

    <div class="lang-box">
        <button onclick="setLang('ko')">🇰🇷 한국어</button>
        <button onclick="setLang('en')">🇺🇸 English</button>
        <button onclick="setLang('zh')">🇨🇳 中文</button>
        <button onclick="setLang('ja')">🇯🇵 日本語</button>
    </div>

    <div class="card">

        <h1 id="title">이 반려견을 발견하셨나요?</h1>

        <div id="desc" class="desc">
            아래 정보를 확인한 뒤<br>
            보호자에게 바로 연락해주세요.
        </div>

        <div id="loading" class="loading">
            반려견 정보를 불러오는 중...
        </div>

        <div id="content" style="display:none;">

            <div class="pet-info">
                <img id="petPhoto"
     style="width:100%;
     max-height:300px;
     object-fit:cover;
     border-radius:15px;
     margin-bottom:15px;
     display:none;">
                <p id="name"></p>
                <p id="breed"></p>
                <p id="gender"></p>
                <p id="feature"></p>
            </div>

            <a id="phoneLink" class="btn phone" href="#" style="display:none;">
                📞 보호자 전화하기
            </a>

            <a id="kakaoLink" class="btn kakao" href="#" target="_blank" style="display:none;">
                💬 카카오톡 연락하기
            </a>

            <button id="shareBtn" class="btn share" onclick="copyPageLink()">
                📤 카카오톡 공유하기
            </button>

            <a id="homeBtn" href="index.html" class="btn home">
                🏠 펫넷 바로가기
            </a>

            <div id="notice" class="notice">
                🔒 펫넷은 개인정보 노출을 줄이고<br>
                발견자와 보호자를 빠르게 연결합니다.
            </div>

        </div>

    </div>

</div>

<script>
var params = new URLSearchParams(window.location.search);
var petId = params.get("id");
var petData = null;
var currentLang = "ko";

var text = {
    ko:{
        title:"이 반려견을 발견하셨나요?",
        desc:"아래 정보를 확인한 뒤<br>보호자에게 바로 연락해주세요.",
        loading:"반려견 정보를 불러오는 중...",
        notFound:"등록 정보를 찾을 수 없습니다.",
        name:"이름",
        breed:"품종",
        gender:"성별",
        feature:"특징",
        noInfo:"정보 없음",
        phone:"📞 보호자 전화하기",
        kakao:"💬 카카오톡 연락하기",
        share:"📤 카카오톡 공유하기",
        home:"🏠 펫넷 바로가기",
        notice:"🔒 펫넷은 개인정보 노출을 줄이고<br>발견자와 보호자를 빠르게 연결합니다.",
        copied:"반려견 페이지 주소가 복사되었습니다. 카카오톡에 붙여넣어 공유할 수 있습니다.",
        copyFail:"주소창의 링크를 복사해서 카카오톡에 공유해주세요."
    },
    en:{
        title:"Did you find this dog?",
        desc:"Please check the information below<br>and contact the owner.",
        loading:"Loading dog information...",
        notFound:"Registration information not found.",
        name:"Name",
        breed:"Breed",
        gender:"Gender",
        feature:"Features",
        noInfo:"No information",
        phone:"📞 Call Owner",
        kakao:"💬 Contact via KakaoTalk",
        share:"📤 Share on KakaoTalk",
        home:"🏠 Visit PetNet",
        notice:"🔒 PetNet helps connect finders and owners<br>while reducing personal information exposure.",
        copied:"The page link has been copied. You can paste it into KakaoTalk to share.",
        copyFail:"Please copy the address bar link and share it on KakaoTalk."
    },
    zh:{
        title:"您发现了这只狗吗？",
        desc:"请确认以下信息后<br>立即联系主人。",
        loading:"正在加载宠物信息...",
        notFound:"找不到登记信息。",
        name:"名字",
        breed:"品种",
        gender:"性别",
        feature:"特征",
        noInfo:"无信息",
        phone:"📞 联系主人",
        kakao:"💬 通过 KakaoTalk 联系",
        share:"📤 分享到 KakaoTalk",
        home:"🏠 访问 PetNet",
        notice:"🔒 PetNet 可减少个人信息暴露<br>并快速连接发现者和主人。",
        copied:"页面链接已复制。您可以粘贴到 KakaoTalk 分享。",
        copyFail:"请复制地址栏链接并分享到 KakaoTalk。"
    },
    ja:{
        title:"この犬を見つけましたか？",
        desc:"下の情報を確認して<br>飼い主に連絡してください。",
        loading:"犬の情報を読み込み中...",
        notFound:"登録情報が見つかりません。",
        name:"名前",
        breed:"犬種",
        gender:"性別",
        feature:"特徴",
        noInfo:"情報なし",
        phone:"📞 飼い主に電話する",
        kakao:"💬 KakaoTalkで連絡する",
        share:"📤 KakaoTalkで共有する",
        home:"🏠 PetNetへ移動",
        notice:"🔒 PetNetは個人情報の露出を減らし<br>発見者と飼い主を素早くつなぎます。",
        copied:"ページのリンクをコピーしました。KakaoTalkに貼り付けて共有できます。",
        copyFail:"アドレスバーのリンクをコピーしてKakaoTalkで共有してください。"
    }
};

function setLang(lang){
    currentLang = lang;
    var t = text[lang];

    document.getElementById("title").innerHTML = t.title;
    document.getElementById("desc").innerHTML = t.desc;
    document.getElementById("phoneLink").innerHTML = t.phone;
    document.getElementById("kakaoLink").innerHTML = t.kakao;
    document.getElementById("shareBtn").innerHTML = t.share;
    document.getElementById("homeBtn").innerHTML = t.home;
    document.getElementById("notice").innerHTML = t.notice;

    if(!petData){
        document.getElementById("loading").innerHTML = t.loading;
    }else{
        renderPetInfo();
    }
}

function renderPetInfo(){
    var t = text[currentLang];

    document.getElementById("name").innerHTML =
        "<b>" + t.name + ":</b> " + (petData.name || t.noInfo);

    document.getElementById("breed").innerHTML =
        "<b>" + t.breed + ":</b> " + (petData.breed || t.noInfo);

    document.getElementById("gender").innerHTML =
        "<b>" + t.gender + ":</b> " + (petData.gender || t.noInfo);

    document.getElementById("feature").innerHTML =
        "<b>" + t.feature + ":</b> " + (petData.feature || t.noInfo);
}

function showPet(data) {
    if (data.error) {
        document.getElementById("loading").innerText = text[currentLang].notFound;
        return;
    }

    petData = data;

    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";

    renderPetInfo();
if (data.photo) {
    document.getElementById("petPhoto").src = data.photo;
    document.getElementById("petPhoto").style.display = "block";
}
    if (data.phone) {
        document.getElementById("phoneLink").href = "tel:" + data.phone;
        document.getElementById("phoneLink").style.display = "block";
    }

    if (data.kakao) {
        document.getElementById("kakaoLink").href = data.kakao;
        document.getElementById("kakaoLink").style.display = "block";
    }
}

function copyPageLink(){
    var pageUrl = window.location.href;

    if (navigator.clipboard) {
        navigator.clipboard.writeText(pageUrl).then(function(){
            alert(text[currentLang].copied);
        });
    } else {
        alert(text[currentLang].copyFail);
    }
}

setLang("ko");

var script = document.createElement("script");
script.src = "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec?id=" + petId + "&callback=showPet";
document.body.appendChild(script);
</script>

</body>
</html>
