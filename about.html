<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PETNET KOREA 소개</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    text-align:center;
    margin:0;
    padding:30px;
}

.card{
    background:white;
    max-width:560px;
    margin:40px auto;
    padding:35px 25px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

h1{
    color:#1f4fbf;
    font-size:30px;
}

h2{
    color:#333;
    font-size:22px;
    margin-top:10px;
}

p{
    font-size:18px;
    line-height:1.8;
    color:#333;
}

.highlight{
    font-weight:bold;
    color:#1f4fbf;
}

a.btn{
    display:block;
    text-decoration:none;
    background:#1f4fbf;
    color:white;
    padding:15px;
    border-radius:10px;
    margin:24px auto 0;
    max-width:320px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
    <h1>🐾 펫넷(PETNET KOREA)</h1>

    <h2>대한민국 반려견 안전 네트워크</h2>

    <p>
        반려견을 잃어버렸을 때<br>
        가장 필요한 것은 빠른 연결입니다.
    </p>

    <p>
        펫넷은 QR 스캔 한 번으로<br>
        발견자와 보호자를 빠르게 연결하는<br>
        <span class="highlight">반려견 분실 무료 QR 서비스</span>입니다.
    </p>

    <p>
        앱 설치 없이,<br>
        회원가입 없이,<br>
        전국민 누구나 간편하게 바로 사용할 수 있습니다.
    </p>

    <p>
        우리는 더 많은 반려견이<br>
        무사히 가족의 품으로 돌아갈 수 있도록<br>
        대한민국 반려견 안전 네트워크를 만들어가고 있습니다.
    </p>

    <a class="btn" href="index.html">홈으로 돌아가기</a>
</div>

</body>
</html>
